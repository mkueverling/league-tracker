<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Tracker - Fluid Prestige UI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --blue: #3498db; --red: #e74c3c; --gold: #f1c40f; --green: #2ecc71; --purple: #9b59b6;
            --bg: #242424; --card: #2f2f35; --card-hover: #383840; --text-main: #f5f5f5;
            --text-muted: #a0a0a8; --border: #404048; --panel-bg: #1e1e22; --search-bg: #2f2f35;
            --tooltip-bg: #1e1e22; --item-bg: #242424; --shadow: rgba(0, 0, 0, 0.5);
            --shadow-card: 0 4px 15px rgba(0, 0, 0, 0.2); --text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        body { margin: 0; padding: 70px 0 0 0; background-color: var(--bg); color: var(--text-main); font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; box-sizing: border-box; }
        .top-header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: var(--card); border-bottom: 1px solid var(--border); box-shadow: var(--shadow-card); display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(50px, 12vw, 15vw); box-sizing: border-box; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: clamp(15px, 2vw, 30px); }
        .logo { font-size: clamp(1.2rem, 1.5vw, 1.5rem); font-weight: 900; color: var(--text-main); letter-spacing: 2px; font-style: italic; white-space: nowrap; }
        
        .region-selector { display: flex; gap: 8px; background: var(--item-bg); padding: 5px; border-radius: 6px; border: 1px solid var(--border); }
        .region-selector span { padding: 4px 12px; font-size: 0.85rem; font-weight: 700; border-radius: 4px; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .region-selector span:hover:not(.disabled) { color: var(--text-main); }
        .region-selector span.active { background: var(--blue); color: #fff; }
        .region-selector span.disabled { opacity: 0.4; cursor: not-allowed; }

        .header-right { display: flex; align-items: center; gap: clamp(10px, 1.5vw, 15px); }
        .share-btn { display: flex; align-items: center; gap: 6px; background: var(--search-bg); color: var(--text-main); padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 800; text-decoration: none; text-transform: uppercase; border: 1px solid var(--border); box-shadow: var(--shadow-card); transition: 0.2s; cursor: pointer; white-space: nowrap; outline: none; }
        .share-btn:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-2px); }

        .search-area { width: clamp(180px, 15vw, 250px); position: relative; }
        .search-container { position: relative; background: var(--search-bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 15px; display: flex; align-items: center; transition: 0.3s; }
        .search-container input { background: none; border: none; width: 100%; color: var(--text-main); font-size: 1.1rem; outline: none; }
        .search-icon { position: absolute; right: 15px; opacity: 0.3; font-size: 1.1rem; pointer-events: none; }
        .scan-loader { display: none; position: absolute; right: 15px; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .top-zone { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; min-height: 5px; padding: 5px 20px; box-sizing: border-box; z-index: 10; }
        .bottom-zone { flex: 1; width: 100%; min-height: 5px; }

        .intel-banner-container { width: 100%; display: flex; justify-content: center; }
        .intel-banner { width: 100%; max-width: 95vw; display: none; align-items: center; justify-content: center; gap: 10px; animation: fadeInDown 0.5s ease forwards; }
        .intel-text { font-size: clamp(0.95rem, 1.1vw, 1.15rem); color: var(--text-main); font-family: monospace; font-weight: 700; line-height: 1.5; text-align: center; width: 100%; }
        .intel-accent { color: var(--gold); font-weight: 900; font-family: 'Roboto', sans-serif; letter-spacing: 1px; text-transform: uppercase; margin-right: 6px; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }

        .arena { position: relative; display: grid; width: 100%; max-width: 95vw; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); align-items: flex-start; gap: clamp(4vw, 8vw, 10vw); padding: 0 20px; box-sizing: border-box; flex: none; }
        .team-box { display: flex; flex-direction: column; gap: clamp(6px, 1.5vh, 25px); z-index: 5; min-width: 0; }

        .card { position: relative; height: clamp(70px, 11vh, 170px); background: var(--card); border-radius: 6px; border: 1px solid var(--border); box-shadow: var(--shadow-card); cursor: pointer; transition: 0.2s; opacity: 0; overflow: visible; width: 100%; }
        .card:hover { background: var(--card-hover); transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); z-index: 50; }
        .card.unclickable { cursor: default; }
        .card.unclickable:hover { border-color: var(--border) !important; background: var(--card); transform: none; box-shadow: var(--shadow-card); z-index: 1; }

        .summary-card { height: clamp(45px, 6vh, 70px) !important; cursor: default; background: transparent !important; border: none !important; box-shadow: none !important; opacity: 1 !important; z-index: 10; animation: fadeIn 0.5s ease forwards; }
        .summary-card.ally-card::before { content: ''; position: absolute; top: 0; bottom: 0; right: 0; left: 36%; background: var(--search-bg); border: 1px dashed var(--border); border-left: 4px solid var(--blue); border-radius: 6px; box-shadow: var(--shadow-card); z-index: 0; transition: 0.2s; }
        .summary-card.enemy-card::before { content: ''; position: absolute; top: 0; bottom: 0; left: 0; right: 36%; background: var(--search-bg); border: 1px dashed var(--border); border-right: 4px solid var(--red); border-radius: 6px; box-shadow: var(--shadow-card); z-index: 0; transition: 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-bg-wrapper { position: absolute; inset: 0; overflow: hidden; border-radius: 5px; z-index: 1; }
        .champ-splash { position: absolute; left: 0; top: 0; bottom: 0; width: 25%; background-size: 150%; background-position: center 20%; opacity: var(--splash-opacity); z-index: 0; -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%); mask-image: linear-gradient(to right, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%); }
        .enemy-card .champ-splash { left: auto; right: 0; background-position: 30% 20%; -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%); mask-image: linear-gradient(to left, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%); }
        .ally-card .champ-splash { background-position: 70% 20%; }
        .row-content { position: absolute; inset: 0; z-index: 5; display: flex; align-items: center; width: 100%; height: 100%; box-sizing: border-box; }
        .ally-card { border-left: 5px solid var(--blue); animation: slideInLeft 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .ally-card .row-content { flex-direction: row; padding: 0 15px 0 18%; }
        .enemy-card { border-right: 5px solid var(--red); animation: slideInRight 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .enemy-card .row-content { flex-direction: row-reverse; padding: 0 18% 0 15px; text-align: right; }
        @keyframes slideInLeft { 0% { opacity: 0; transform: translateX(-40px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { 0% { opacity: 0; transform: translateX(40px); } 100% { opacity: 1; transform: translateX(0); } }

        .identity-group { display: flex; flex-direction: column; justify-content: center; flex: 1.2; min-width: 0; padding: 0 1vw; container-type: inline-size; }
        .enemy-card .identity-group { align-items: flex-end; text-align: right; }
        .riot-id-wrapper { display: flex; flex-direction: column; width: 100%; }
        .enemy-card .riot-id-wrapper { align-items: flex-end; }
        .main-name { font-size: clamp(0.95rem, 10cqw, 1.8rem); font-weight: 800; margin: 0; color: var(--text-main); }
        .pro-label { color: var(--gold); font-size: clamp(1.1rem, 12cqw, 2rem); font-weight: 900; line-height: 1; margin: 0 0 2px 0; text-transform: uppercase; text-shadow: var(--text-shadow); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .creator-label { color: var(--blue); font-size: clamp(1.1rem, 12cqw, 2rem); font-weight: 900; line-height: 1; margin: 0 0 2px 0; text-transform: uppercase; text-shadow: var(--text-shadow); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .truncate-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; max-width: 100%; }
        
        .mantra-text { font-size: 0.8rem; color: var(--gold); font-style: italic; opacity: 0.9; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .mastery-group { display: flex; flex-direction: column; justify-content: center; align-items: center; flex: 0.8; padding: 0 1vw; border-left: 1px solid var(--border); }
        .enemy-card .mastery-group { border-right: 1px solid var(--border); border-left: none; }
        .mastery-label { font-size: clamp(0.6rem, 0.75vw, 0.85rem); color: var(--text-muted); font-weight: 700; letter-spacing: 1px; margin-bottom: 2px; text-transform: uppercase; text-align: center; }
        .mastery-score { font-size: clamp(1.1rem, 1.5vw, 2rem); font-weight: 900; color: var(--text-main); text-shadow: var(--text-shadow); } 

        .stats-group { display: flex; flex-direction: column; justify-content: center; padding: 0 1vw; border-left: 1px solid var(--border); border-right: 1px solid var(--border); flex: 1; min-width: 0; }
        .enemy-card .stats-group { border-right: none; border-left: 1px solid var(--border); text-align: left; }
        .stat-line { font-size: clamp(0.85rem, 1.1vw, 1.3rem); color: var(--text-muted); margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stat-highlight { color: var(--text-main); font-weight: 700; }

        .tags-group { display: flex; flex-direction: row; flex-wrap: wrap; align-content: center; gap: 6px; flex: 0.8; min-width: 0; padding: 0 1vw; }
        .enemy-card .tags-group { justify-content: flex-end; }
        
        .badge { padding: clamp(3px, 0.3vh, 4px) clamp(6px, 0.6vw, 10px); border-radius: 4px; font-size: clamp(0.65rem, 0.9vh, 0.9rem); font-weight: 800; text-transform: uppercase; width: fit-content; white-space: nowrap; display: inline-block; }
        .badge-positive { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
        .badge-negative { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.3); }
        .badge-neutral { background: rgba(52, 152, 219, 0.15); color: #3498db; border: 1px solid rgba(52, 152, 219, 0.3); }
        .badge-pro { background: rgba(241, 196, 15, 0.15); color: #f1c40f; border: 1px solid rgba(241, 196, 15, 0.4); box-shadow: 0 0 8px rgba(241, 196, 15, 0.1); }
        .badge-special { background: linear-gradient(135deg, rgba(142, 68, 173, 0.8), rgba(41, 128, 185, 0.8)); color: white; border: 1px solid #9b59b6; box-shadow: 0 0 8px rgba(155, 89, 182, 0.3); }

        .tooltip-box { position: relative; cursor: help; }
        .tooltip-box:hover::after { content: attr(data-tooltip); position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); background: var(--tooltip-bg); color: var(--text-main); padding: 6px 12px; border-radius: 4px; font-size: 0.75rem; width: max-content; max-width: 250px; text-align: center; border: 1px solid var(--border); z-index: 100; white-space: normal; line-height: 1.4; font-family: 'Roboto', sans-serif; box-shadow: 0 4px 15px var(--shadow); pointer-events: none; }
        .top-header .tooltip-box:hover::after { bottom: auto; top: 125%; }

        /* --- FLUID SIDEBAR --- */
        .history-panel { box-sizing: border-box; position: fixed; right: -750px; top: 0; width: 28vw; min-width: 480px; max-width: 700px; height: 100vh; background: var(--panel-bg); border-left: 2px solid var(--border); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 200; overflow-y: auto; overflow-x: hidden; padding-bottom: 20px;}
        .history-panel.active { right: 0; box-shadow: -10px 0 30px var(--shadow); }
        .sidebar-content { position: relative; z-index: 10; padding: 30px; }
        .close-btn { cursor: pointer; color: var(--red); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; display: inline-block; font-weight: bold; }
        
        /* --- RECENT GAMES & EXPANDABLE MATCHES --- */
        .recent-games-header { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin: 25px 0 10px 0; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
        .match-card { background: var(--card); padding: 15px; margin-bottom: 12px; border-radius: 6px; box-shadow: var(--shadow-card); display: flex; flex-direction: column; gap: 10px; border: 1px solid var(--border); border-left-width: 4px; cursor: pointer; transition: 0.2s;}
        .match-card:hover { background: var(--card-hover); border-color: var(--text-muted); }
        .match-row-main { display: flex; gap: 15px; align-items: center; width: 100%; justify-content: space-between; }
        
        .match-champs { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
        .match-champ-icon { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--border); }
        .opp-champ { opacity: 0.8; width: 35px; height: 35px; }
        
        .match-details { flex: 1; }
        .expand-icon { transition: transform 0.3s ease; color: var(--text-muted); margin-left: 10px; }
        .match-card.expanded .expand-icon { transform: rotate(180deg); color: var(--text-main); }
        
        /* --- EXPANDED CONTENT STYLES --- */
        .build-path-container { display: none; background: #1c1c1f; margin-top: 10px; border-radius: 4px; padding: 20px; border: 1px solid #2a2a2e; width: 100%; box-sizing: border-box; }
        .section-title { font-size: 0.75rem; color: #7b7a8e; text-transform: uppercase; font-weight: 800; margin-bottom: 12px; border-left: 2px solid var(--gold); padding-left: 8px; line-height: 1; }
        
        .seq-badge { width: 22px; height: 22px; border-radius: 3px; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; background: #282830; color: #7b7a8e; }
        .seq-badge.is-q { background: #3498db; color: white; }
        .seq-badge.is-w { background: #2ecc71; color: white; }
        .seq-badge.is-e { background: #e67e22; color: white; }
        .seq-badge.is-r { background: #9b59b6; color: white; }
        
        .rune-box-full { display: flex; justify-content: space-between; background: #232327; padding: 20px; border-radius: 6px; width: 100%; border: 1px solid #2a2a2e; box-sizing: border-box; }
        .rune-column { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .stat-column { border-left: 1px solid #3e3e4a; padding-left: 15px; justify-content: center; flex: 0.5; }

        .legal-footer { position: absolute; bottom: 0; width: 100%; text-align: center; padding: 10px 20px; font-size: 0.6rem; color: var(--text-muted); background: rgba(36, 36, 36, 0.9); border-top: 1px solid var(--border); z-index: 100; box-sizing: border-box; }
        .loader-ring { display: inline-block; width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: var(--blue); animation: spin 1s ease-in-out infinite; margin-top: 20px; }
    </style>
</head>
<body>

<header class="top-header">
    <div class="header-left">
        <div class="logo">PRO TRACKER</div>
        <div class="region-selector">
            <span class="active">EUW</span>
            <span class="disabled tooltip-box" data-tooltip="Not currently supported">NA</span>
            <span class="disabled tooltip-box" data-tooltip="Not currently supported">KR</span>
        </div>
    </div>
    <div class="header-right">
        <div class="search-area">
            <div class="search-container" id="search-container">
                <input type="text" id="target" placeholder="TARGET#TAG" autocomplete="off">
                <div id="search-icon" class="search-icon">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </div>
                <div id="scan-loader" class="scan-loader"></div>
            </div>
        </div>
        <button class="share-btn" onclick="copyLobbyLink(this)">SHARE</button>
    </div>
</header>

<div class="top-zone">
    <div class="intel-banner-container">
        <div class="intel-banner" id="intel-banner"><span class="intel-text" id="intel-text"></span></div>
    </div>
</div>

<div class="arena" id="arena">
    <div id="left-team" class="team-box"></div>
    <div id="right-team" class="team-box"></div>
</div>

<div class="bottom-zone"></div>

<footer class="legal-footer">
    Pro Tracker was created under Riot Games' "Legal Jibber Jabber" policy using assets owned by Riot Games. Riot Games does not endorse or sponsor this project.
</footer>

<div id="history-panel" class="history-panel">
    <div class="sidebar-content">
        <span class="close-btn" id="close-panel-btn">✕ CLOSE</span>
        <h1 id="panel-player-name" style="font-size: 2.8rem; margin-top: 10px; margin-bottom: 0; line-height: 1;">PLAYER</h1>
        <p id="panel-riot-id" style="color: var(--text-muted); font-size: 1.2rem; margin-top: 5px; font-weight: bold;"></p>
        <div id="panel-bio" style="color: var(--gold); font-weight: 800; margin-top: 10px; font-size: 1rem;"></div>
        <div style="height: 1px; background: var(--border); margin: 25px 0;"></div>
        <div id="history-loading"></div>
    </div>
</div>

<script>
    const lTeam = document.getElementById('left-team');
    const rTeam = document.getElementById('right-team');
    const hPanel = document.getElementById('history-panel');
    const scanLoader = document.getElementById('scan-loader');
    const searchIcon = document.getElementById('search-icon');
    let patch = "14.8.1"; 

    let championMap = {};
    let perksMap = {};
    
    const historyCache = {};
    const timelineCache = {};

    async function loadDictionaries() {
        try {
            const verRes = await fetch("https://ddragon.leagueoflegends.com/api/versions.json");
            const versions = await verRes.json();
            patch = versions[0]; 

            const champRes = await fetch(`https://ddragon.leagueoflegends.com/cdn/${patch}/data/en_US/champion.json`);
            const champData = await champRes.json();
            for (let champName in champData.data) { championMap[champData.data[champName].key] = champData.data[champName].id; }
            
            const perksRes = await fetch("https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/perks.json");
            const perksData = await perksRes.json();
            perksData.forEach(perk => {
                let path = perk.iconPath.toLowerCase();
                perksMap[perk.id] = path.replace('/lol-game-data/assets/v1/', 'https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/');
            });
        } catch (e) { console.error("Dictionary Load Failed", e); }
    }
    loadDictionaries();

    let currentHistoryOffset = 0;
    let currentHistoryPuuid = "";

    function copyLobbyLink(btn) {
        navigator.clipboard.writeText("protracker.gg/live/EUW/19238471");
        btn.innerHTML = "COPIED!"; btn.style.color = "var(--green)"; btn.style.borderColor = "var(--green)";
        setTimeout(() => { btn.innerHTML = "SHARE"; btn.style.color = ""; btn.style.borderColor = ""; }, 2000);
    }

    function formatMastery(points) {
        if (!points) return "0k";
        if (points >= 1000000) return (points / 1000000).toFixed(1) + "M";
        return Math.floor(points / 1000) + "k";
    }

    function abbreviateRank(rank) {
        const r = rank.toLowerCase();
        if (r === 'challenger') return 'CHAL';
        if (r === 'grandmaster') return 'GM';
        if (r === 'master') return 'MAST';
        if (r === 'diamond') return 'DIA';
        if (r === 'emerald') return 'EME';
        if (r === 'platinum') return 'PLAT';
        if (r === 'gold') return 'GOLD';
        if (r === 'silver') return 'SILV';
        if (r === 'bronze') return 'BRNZ';
        if (r === 'iron') return 'IRON';
        return rank.toUpperCase();
    }

    function getBadgeClass(tag) {
        if (["Winners Queue", "On Fire", "STOMP ANGLE?"].includes(tag)) return "badge-positive";
        if (["Unlucky", "Losers Queue", "TILT SWAPPED", "YOU'RE COOKED", "FF ANGLE?", "INSECURE"].includes(tag)) return "badge-negative";
        if (tag === "SECRET WEAPON") return "badge-special";
        if (tag === "PRO") return "badge-pro";
        return "badge-neutral"; 
    }

    function renderTeamSummary(teamArray, side, teamTags) {
        let totalMastery = 0;
        teamArray.forEach(p => totalMastery += p.total_mastery || 0);
        const sideClass = side === 'ally' ? 'ally-card' : 'enemy-card';
        let tagHtml = teamTags.map(tag => `<div class="badge ${getBadgeClass(tag)}">${tag}</div>`).join('');
        return `<div class="card summary-card ${sideClass}"><div class="row-content"><div class="identity-group"></div><div class="mastery-group"><div class="mastery-label" style="color: var(--gold);">TEAM MASTERY</div><div class="mastery-score">${formatMastery(totalMastery)}</div></div><div class="stats-group"></div><div class="tags-group">${tagHtml}</div></div></div>`;
    }

    function render(p, index) {
        const champName = championMap[p.championId] || "Unknown";
        const splashImg = `https://ddragon.leagueoflegends.com/cdn/img/champion/centered/${champName}_0.jpg`;
        const clickAction = p.is_streamer ? "" : `onclick='openHistory(${JSON.stringify(p).replace(/'/g, "&#39;")})'`;
        
        if (p.is_streamer) {
            return `
            <div class="card ${p.side}-card unclickable" style="animation-delay: ${index * 0.15}s;">
                <div class="card-bg-wrapper"><div class="champ-splash" style="background-image: url('${splashImg}')"></div></div>
                <div class="row-content">
                    <div class="identity-group"></div>
                    <div class="mastery-group"></div>
                    <div class="stats-group"></div>
                    <div class="tags-group"></div>
                </div>
            </div>`;
        }

        let identityHtml = `<div class="riot-id-wrapper"><span class="main-name truncate-text">${p.riotId}</span>`;
        if (p.mantra) {
            identityHtml += `<div class="mantra-text">"${p.mantra}"</div>`;
        }
        identityHtml += `</div>`;
        
        if (p.is_pro || p.is_creator) {
            identityHtml = `<div class="${p.is_pro ? 'pro' : 'creator'}-label">${p.known_name}</div>` + identityHtml;
        }

        const statsHtml = (p.rank.toLowerCase() === 'unranked')
            ? `<div class="stat-line" style="color: #7b7a8e; font-weight: 800; font-size: 0.9rem; text-transform: uppercase;">Unranked</div>`
            : `<div class="stat-line stat-highlight">${abbreviateRank(p.rank)} <span class="stat-highlight">${p.lp || 0} LP</span></div>
               <div class="stat-line">WR: <span class="stat-highlight">N/A</span></div>
               <div class="stat-line">KDA: <span class="stat-highlight">N/A</span></div>`;

        let tagsHtml = '';
        if (p.is_pro) tagsHtml += `<div class="badge ${getBadgeClass('PRO')}">PRO</div>`;
        if (p.tag) tagsHtml += `<div class="badge ${getBadgeClass(p.tag)}">${p.tag}</div>`;

        return `
            <div class="card ${p.side}-card" style="animation-delay: ${index * 0.15}s;" ${clickAction}>
                <div class="card-bg-wrapper"><div class="champ-splash" style="background-image: url('${splashImg}')"></div></div>
                <div class="row-content">
                    <div class="identity-group">${identityHtml}</div>
                    <div class="mastery-group tooltip-box" data-tooltip="${formatMastery(p.current_mastery)} on this account, ${formatMastery(p.total_mastery)} total across all connected accounts.">
                        <div class="mastery-label">True Mastery</div>
                        <div class="mastery-score">${formatMastery(p.total_mastery)}</div>
                    </div>
                    <div class="stats-group">
                        ${statsHtml}
                    </div>
                    <div class="tags-group">${tagsHtml}</div>
                </div>
            </div>`;
    }

    async function executeScan() {
        const rawQuery = document.getElementById('target').value.trim();
        if(!rawQuery.includes('#')) return;
        const [name, tag] = rawQuery.split('#');

        searchIcon.style.display = 'none'; scanLoader.style.display = 'block';
        lTeam.innerHTML = ''; rTeam.innerHTML = ''; document.getElementById('intel-banner').style.display = 'none';

        try {
            const res = await fetch(`http://localhost:8000/api/player/${encodeURIComponent(name)}/${encodeURIComponent(tag)}`);
            if (!res.ok) throw new Error("Player not found");
            const liveData = await res.json();
            if (liveData.status === "history") throw new Error("Player not in game.");

            document.getElementById('intel-text').innerHTML = `<span class='intel-accent'>GAME INFO:</span> Live data retrieved successfully.`;
            document.getElementById('intel-banner').style.display = 'flex';

            lTeam.innerHTML = renderTeamSummary(liveData.allies, 'ally', []) + liveData.allies.map((p, i) => render(p, i)).join('');
            rTeam.innerHTML = renderTeamSummary(liveData.enemies, 'enemy', liveData.ff_angle ? ["FF ANGLE?"] : []) + liveData.enemies.map((p, i) => render(p, i)).join('');
        } catch (e) {
            document.getElementById('intel-text').innerHTML = `<span class='intel-accent' style='color:var(--red);'>ERROR:</span> ${e.message}`;
            document.getElementById('intel-banner').style.display = 'flex';
        }
        scanLoader.style.display = 'none'; searchIcon.style.display = 'block';
    }

    async function openHistory(p) {
        if (!p.puuid || p.is_streamer) return; 
        isPanelOpen = true; hPanel.classList.add('active');
        currentHistoryOffset = 0; currentHistoryPuuid = p.puuid;
        
        document.getElementById('panel-player-name').innerText = p.known_name || p.riotId.split('#')[0];
        document.getElementById('panel-riot-id').innerText = p.riotId;
        
        let smurfsHtml = '';
        if (p.smurfs && p.smurfs.length > 0) {
            smurfsHtml = `
                <div style="margin-top: 15px;">
                    <div style="font-size: 0.75rem; color: #7b7a8e; text-transform: uppercase; font-weight: 800; margin-bottom: 8px;">Known Accounts</div>
                    <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                        ${p.smurfs.map(s => `<span style="background: #282830; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; border: 1px solid #3e3e4a; color: var(--text-main);">${s}</span>`).join('')}
                    </div>
                </div>
            `;
        }
        
        document.getElementById('panel-bio').innerHTML = (p.is_pro ? (p.team ? `${p.team} Starter` : "Professional Player") : "") + smurfsHtml;
        document.getElementById('history-loading').innerHTML = `<div class="loader-ring" style="display:block; margin: 40px auto;"></div>`;
        
        await fetchAndRenderMatches(0);
    }

    async function fetchAndRenderMatches(offset) {
        const loadingDiv = document.getElementById('history-loading');
        try {
            const cacheKey = `${currentHistoryPuuid}_${offset}`;
            let matchData;
            
            if (historyCache[cacheKey]) {
                matchData = historyCache[cacheKey]; 
            } else {
                const response = await fetch(`http://localhost:8000/api/history/${currentHistoryPuuid}?start=${offset}&count=5`);
                matchData = await response.json();
                historyCache[cacheKey] = matchData; 
            }
            
            const chevronSvg = `<svg class="expand-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>`;

            const historyHtml = matchData.map(m => {
                const color = m.isWin ? 'var(--blue)' : 'var(--red)';
                
                const oppImg = m.oppChamp !== "Unknown" ? `<img src="https://ddragon.leagueoflegends.com/cdn/${patch}/img/champion/${m.oppChamp}.png" class="match-champ-icon opp-champ" onerror="this.style.display='none'">` : '';
                const vsText = m.oppChamp !== "Unknown" ? `<span style="font-size:0.7rem; color:var(--text-muted); font-weight:bold; margin: 0 4px;">VS</span>` : '';
                
                const invItems = m.items.slice(0, 6).map(id => id > 0 
                    ? `<img src="https://ddragon.leagueoflegends.com/cdn/${patch}/img/item/${id}.png" style="width: 24px; height: 24px; border-radius: 4px;">` 
                    : `<div style="width: 24px; height: 24px; border-radius: 4px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);"></div>`
                ).join('');
                
                const trinket = m.items[6] > 0 
                    ? `<img src="https://ddragon.leagueoflegends.com/cdn/${patch}/img/item/${m.items[6]}.png" style="width: 24px; height: 24px; border-radius: 50%;">` 
                    : `<div style="width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);"></div>`;

                const finalItemsHtml = `<div style="display:flex; gap:2px; align-items:center;">${invItems} <div style="width:1px; height:20px; background:#3e3e4a; margin: 0 4px;"></div> ${trinket}</div>`;

                const runesJson = encodeURIComponent(JSON.stringify(m.runes));

                return `
                <div class="match-card" style="border-left-color: ${color}" onclick="toggleBuildPath(this, '${m.matchId}', '${m.puuid}', '${runesJson}')">
                    <div class="match-row-main">
                        <div style="display: flex; gap: 15px; align-items: center;">
                            <div class="match-champs tooltip-box" data-tooltip="Laned against ${m.oppChamp}">
                                <img src="https://ddragon.leagueoflegends.com/cdn/${patch}/img/champion/${m.myChamp}.png" class="match-champ-icon">
                                ${vsText}
                                ${oppImg}
                            </div>
                            <div class="match-details">
                                <div style="color: ${color}; font-weight: 900; font-size: 1.1rem;">${m.result} <span style="color: var(--text-muted); font-size: 0.8rem; font-weight: normal; margin-left: 5px;">${m.time}</span></div>
                                <div style="font-family: monospace; color: var(--text-main); font-size: 1rem; font-weight:bold; margin: 3px 0;">
                                    ${m.kda} <span style="color: var(--red); font-size: 0.75rem; font-family: 'Roboto', sans-serif; margin-left: 6px; font-weight: 800;">(${m.kp} KP)</span>
                                </div>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; justify-content: flex-end; flex: 1;">
                            ${finalItemsHtml}
                            ${chevronSvg}
                        </div>
                    </div>
                    <div class="build-path-container"></div>
                </div>`;
            }).join('');

            const loadBtn = `<button onclick="loadMoreMatches()" style="width:100%; padding:12px; background:var(--search-bg); border:1px solid var(--border); color:var(--text-main); font-weight:bold; border-radius:6px; cursor:pointer; margin-top:10px;">Load 5 More Games</button>`;
            
            if (offset === 0) loadingDiv.innerHTML = `<div class="recent-games-header">Recent Games</div>` + historyHtml + loadBtn;
            else { loadingDiv.querySelector('button').remove(); loadingDiv.innerHTML += historyHtml + loadBtn; }
        } catch (error) { loadingDiv.innerHTML = `<div style="color: var(--red); text-align: center; margin-top: 50px;">Failed to load.</div>`; }
    }

    function loadMoreMatches() {
        currentHistoryOffset += 5;
        document.getElementById('history-loading').querySelector('button').innerText = "Loading...";
        fetchAndRenderMatches(currentHistoryOffset);
    }

    async function toggleBuildPath(cardElem, matchId, puuid, runesEncoded) {
        const container = cardElem.querySelector('.build-path-container');
        if (container.style.display === 'block') {
            container.style.display = 'none';
            cardElem.classList.remove('expanded');
            return;
        }
        
        container.style.display = 'block';
        cardElem.classList.add('expanded');
        if (container.innerHTML !== '') return; 

        container.innerHTML = '<div class="loader-ring" style="width: 20px; height: 20px; margin: 10px auto; display: block;"></div>';
        
        try {
            let timeline;
            if (timelineCache[matchId]) {
                timeline = timelineCache[matchId];
            } else {
                const res = await fetch(`http://localhost:8000/api/timeline/${matchId}/${puuid}`);
                timeline = await res.json();
                timelineCache[matchId] = timeline; 
            }
            
            const r = JSON.parse(decodeURIComponent(runesEncoded));

            const seqHtml = timeline.skills.slice(0, 18).map(s => {
                const label = {1:'Q', 2:'W', 3:'E', 4:'R'}[s];
                return `<div class="seq-badge is-${label.toLowerCase()}">${label}</div>`;
            }).join('');

            const safeR = (id, sz, cls="") => id ? `<img src="${perksMap[id]}" style="width:${sz}px; height:${sz}px; ${cls}">` : '';
            
            const runesHtml = `
                <div class="rune-box-full">
                    <div class="rune-column">
                        ${safeR(r.primaryPerks[0], 42)}
                        <div style="display:flex; gap:6px;">
                            ${r.primaryPerks.slice(1).map(p => safeR(p, 28, "opacity:0.9")).join('')}
                        </div>
                    </div>
                    <div class="rune-column">
                        <div style="display:flex; gap:6px; margin-top: 10px;">
                            ${r.subPerks.map(p => safeR(p, 28, "opacity:0.9")).join('')}
                        </div>
                    </div>
                    <div class="rune-column stat-column" style="gap:6px;">
                        ${r.statPerks.map(p => safeR(p, 22, "filter:brightness(1.2)")).join('')}
                    </div>
                </div>
            `;

            const ignored = new Set([2003, 2055, 2031, 2033, 3340, 3364, 3363, 2010]);
            const batches = [];
            timeline.purchases.forEach(e => {
                if (ignored.has(e.itemId)) return;
                const m = Math.floor(e.timestamp / 60000);
                if (!batches.length || batches[batches.length-1].m !== m) batches.push({m:m, items:[e.itemId]});
                else batches[batches.length-1].items.push(e.itemId);
            });

            const itemsHtml = batches.map(b => `
                <div style="display:flex; flex-direction:column; align-items:center; gap:4px; margin-bottom: 8px;">
                    <div style="display:flex; gap:4px; background:#282830; padding:6px; border-radius:4px; border: 1px solid #3e3e4a;">
                        ${b.items.map(id => `<img src="https://ddragon.leagueoflegends.com/cdn/${patch}/img/item/${id}.png" style="width:26px; height:26px; border-radius:3px;">`).join('')}
                    </div>
                    <span style="font-size:11px; color:#7b7a8e; font-weight:bold;">${b.m}m</span>
                </div>
            `).join('<div style="color:#666; font-size:20px; font-weight:bold; margin-top:8px; align-self: flex-start; padding-top: 2px;">›</div>');

            container.innerHTML = `
                <div style="display:flex; flex-direction:column; gap:25px; margin-top:5px;">
                    <div>
                        <div class="section-title">Recall Timeline</div>
                        <div style="display:flex; flex-wrap:wrap; gap:6px; align-items:flex-start;">
                            ${itemsHtml || '<span style="color:var(--text-muted); font-size:0.8rem;">No items purchased.</span>'}
                        </div>
                    </div>
                    <div>
                        <div class="section-title">Skill Sequence</div>
                        <div style="display:flex; gap:4px; flex-wrap:wrap;">
                            ${seqHtml}
                        </div>
                    </div>
                    <div>
                        <div class="section-title">Runes & Stats</div>
                        ${runesHtml}
                    </div>
                </div>
            `;
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div style="color:var(--red); text-align:center;">Failed to load match details.</div>';
        }
    }

    document.getElementById('target').addEventListener('keypress', e => { if (e.key === 'Enter') executeScan(); });
    document.getElementById('close-panel-btn').addEventListener('click', () => { isPanelOpen = false; hPanel.classList.remove('active'); });
    document.addEventListener('click', (e) => { if (hPanel.classList.contains('active') && !hPanel.contains(e.target) && !e.target.closest('.card')) hPanel.classList.remove('active'); });
</script>
</body>
</html>
