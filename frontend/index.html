<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Tracker</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-top: 10vh;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .search-container {
            display: flex;
            width: 100%;
            max-width: 500px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 1px solid #333;
            border-radius: 8px 0 0 8px;
            background-color: #1e1e1e;
            color: #fff;
            outline: none;
        }

        button {
            padding: 15px 25px;
            font-size: 1.1rem;
            background-color: #5c85d6;
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            font-weight: bold;
        }

        #error-message { color: #ff4d4d; margin-top: 10px; height: 20px; font-size: 0.9rem; }

        #results-container {
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
            display: none;
        }

        .summary-text {
            font-size: 1.1rem;
            color: #a0a0a0;
            margin-bottom: 20px;
            text-align: center;
        }

        .loader {
            display: none;
            margin-top: 20px;
            color: #5c85d6;
        }

        /* --- Live Card Styling --- */
        .live-badge {
            color: #ff4d4d;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background-color: #ff4d4d;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 77, 77, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
        }

        .player-header {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .rank-text {
            color: #e6b800;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .mastery-text {
            color: #00cc66;
            font-weight: bold;
            font-size: 0.9rem;
            text-align: right;
        }

        /* --- History Card Styling --- */
        .match-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background-color: #2a2a2a;
            color: white;
            border-bottom: 1px solid #333;
        }

        .pro-count-badge {
            background-color: #5c85d6;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 999px;
            margin-right: 10px;
        }

        .pro-row {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
        }

        .pro-row:last-child {
            border-bottom: none;
        }

        .pro-info h2 { margin: 0 0 3px 0; font-size: 1.1rem; }
        .pro-info p { margin: 0; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>TRACKER</h1>

    <div class="search-container">
        <input type="text" id="riot-input" placeholder="Enter Riot ID (e.g. Faker#KR1)" autocomplete="off">
        <button id="search-btn">Search</button>
    </div>

    <div id="error-message"></div>
    <div id="loader" class="loader">Scanning Riot API & Database...</div>
    <div id="results-container"></div>

    <script>
        const searchBtn = document.getElementById('search-btn');
        const riotInput = document.getElementById('riot-input');
        const errorMessage = document.getElementById('error-message');
        const loader = document.getElementById('loader');
        const resultsContainer = document.getElementById('results-container');

        // Formats timestamps to actual dates
        function formatDate(timestampMs) {
            const date = new Date(timestampMs);
            return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        // Extracts Solo/Duo rank if available
        function getRankString(rankData) {
            if (!rankData || rankData.length === 0) return "Unranked";
            const soloQ = rankData.find(r => r.queueType === "RANKED_SOLO_5x5");
            if (!soloQ) return "Unranked in SoloQ";
            return `${soloQ.tier} ${soloQ.rank} - ${soloQ.leaguePoints} LP`;
        }

        // --- RENDER LIVE GAME ---
        function renderLive(data) {
            const rankString = getRankString(data.rank_data);
            
            let prosHtml = "";
            if (data.pros_in_game.length === 0) {
                prosHtml = `<div class="summary-text" style="margin-top:20px;">No pros detected in this live game.</div>`;
            } else {
                prosHtml = data.pros_in_game.map(pro => `
                    <div class="pro-row">
                        <div class="pro-info">
                            <h2>🚨 ${pro.pro_name}</h2>
                            <p>Smurfing as: ${pro.playing_as_account}</p>
                            <p>Champion ID: ${pro.champion_id}</p>
                        </div>
                        <div class="mastery-text">
                            True Mastery:<br>
                            ${pro.true_combined_mastery.toLocaleString()} pts
                        </div>
                    </div>
                `).join('');
            }

            resultsContainer.innerHTML = `
                <div class="live-badge">
                    <div class="pulse-dot"></div>
                    LIVE MATCH DETECTED
                </div>
                <div class="player-header">
                    <h2>${data.searched_player}</h2>
                    <div class="rank-text">${rankString}</div>
                </div>
                <div class="match-card">
                    <div class="match-header">
                        <span>Pro Radar Alert</span>
                    </div>
                    ${prosHtml}
                </div>
            `;
            resultsContainer.style.display = 'block';
        }

        // --- RENDER MATCH HISTORY ---
        function renderHistory(data) {
            if (!data.history || data.history.length === 0) {
                resultsContainer.innerHTML = `<div class="summary-text">Player is not in-game, and no historical matches against pros were found.</div>`;
                resultsContainer.style.display = 'block';
                return;
            }

            const cardsHtml = data.history.map(match => {
                const proCount = match.pros_in_game.length;
                const proLabel = proCount === 1 ? '1 Pro' : `${proCount} Pros`;

                const rosterHtml = match.pros_in_game.map(pro => `
                    <div class="pro-row">
                        <div class="pro-info">
                            <h2>${pro.pro_name}</h2>
                            <p>${pro.account}</p>
                        </div>
                    </div>
                `).join('');

                return `
                    <div class="match-card">
                        <div class="match-header">
                            <div>
                                <span class="pro-count-badge">${proLabel}</span>
                                <span>${formatDate(match.timestamp)}</span>
                            </div>
                        </div>
                        <div>${rosterHtml}</div>
                    </div>
                `;
            }).join('');

            resultsContainer.innerHTML = `
                <div class="summary-text">Player is not in-game. Showing historical matches:</div>
                <div class="match-list">${cardsHtml}</div>
            `;
            resultsContainer.style.display = 'block';
        }

        // --- MAIN SEARCH LOGIC ---
        async function executeSearch() {
            const inputValue = riotInput.value.trim();
            errorMessage.textContent = '';
            resultsContainer.style.display = 'none';

            if (!inputValue.includes('#')) {
                errorMessage.textContent = "Invalid format. Must include a hashtag (e.g., Name#Tag).";
                return;
            }

            const [gameName, tagLine] = inputValue.split('#');
            if (!gameName || !tagLine) {
                errorMessage.textContent = "Invalid format. Missing name or tag.";
                return;
            }

            loader.style.display = 'block';

            try {
                // Completely fixed string interpolation here!
                const url = `http://127.0.0.1:8000/api/player/${encodeURIComponent(gameName)}/${encodeURIComponent(tagLine)}`;
                const response = await fetch(url);
                const data = await response.json();
                
                loader.style.display = 'none';

                if (!response.ok) {
                    throw new Error(data.detail || "Error connecting to backend.");
                }

                if (data.status === "live") {
                    renderLive(data);
                } else if (data.status === "history") {
                    renderHistory(data);
                }

            } catch (error) {
                loader.style.display = 'none';
                errorMessage.textContent = error.message;
            }
        }

        searchBtn.addEventListener('click', executeSearch);
        riotInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') executeSearch(); });
    </script>
</body>
</html>
