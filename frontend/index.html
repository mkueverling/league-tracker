<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Scout</title>
    <style>
        :root { --blue: #3498db; --red: #e74c3c; --gold: #f1c40f; --bg: #1a1a1c; --card: #252529; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: #fff; font-family: 'Segoe UI', Impact, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .history-panel { position: fixed; right: -420px; top: 0; width: 400px; height: 100vh; background: #111; border-left: 2px solid #333; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; padding: 30px; box-shadow: -20px 0 50px rgba(0,0,0,0.9); }
        .history-panel.active { right: 0; }
        .close-btn { cursor: pointer; color: var(--red); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; display: block; }
        .bridge { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 350px; z-index: 10; gap: 20px; }
        .search-area { display: flex; flex-direction: column; width: 300px; background: #2a2a2e; border: 1px solid #3a3a40; border-radius: 8px; padding: 15px; }
        .search-area input { background: none; border: none; border-bottom: 2px solid #444; padding: 10px; color: #fff; font-size: 1.2rem; outline: none; text-align: center; }
        .search-area button { background: #3a3a40; border: none; color: #fff; margin-top: 15px; padding: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .ff-tag { color: var(--red); font-weight: 900; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 5px; animation: blink 0.8s infinite; display: none; text-shadow: 0 0 20px var(--red); }
        @keyframes blink { 50% { opacity: 0; } }
        .arena { display: grid; width: 98vw; max-width: 1900px; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px; }
        .team-box { display: flex; flex-direction: column; gap: 15px; }
        .card { position: relative; height: 145px; background: var(--card); border-radius: 4px; display: flex; align-items: center; border: 1px solid #333; padding: 0 25px; overflow: hidden; background-repeat: no-repeat; background-size: 150%; cursor: pointer; transition: 0.2s; background-blend-mode: soft-light; }
        .ally-card { border-left: 8px solid var(--blue); background-position: 85% center; }
        .enemy-card { border-right: 8px solid var(--red); flex-direction: row-reverse; text-align: right; background-position: 15% center; }
        .pro-highlight { border-top: 2px solid var(--gold) !important; border-bottom: 2px solid var(--gold) !important; box-shadow: inset 0 0 20px rgba(241, 196, 15, 0.15); }
        .pro-label { color: var(--gold); font-size: 1.8rem; font-weight: 900; line-height: 1; margin: 0; text-transform: uppercase; }
        .portrait { width: 100px; height: 100px; border-radius: 4px; border: 2px solid #222; object-fit: cover; z-index: 2; }
        .details { flex: 1; margin: 0 30px; z-index: 2; }
        .champ-title { font-size: 0.8rem; color: var(--blue); text-transform: uppercase; font-weight: 800; letter-spacing: 2px; }
        .riot-name { font-size: 1.1rem; color: #aaa; margin-top: 2px; font-weight: 400; }
        .mastery-info { position: relative; display: inline-block; margin-top: 10px; font-family: monospace; font-size: 0.95rem; cursor: help; }
        .mastery-info span { color: #2ecc71; font-weight: bold; }
        .mastery-info:hover::after { content: attr(data-tooltip); position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 12px; border-radius: 4px; font-size: 0.8rem; width: 260px; text-align: center; border: 1px solid #444; z-index: 100; white-space: pre-wrap; line-height: 1.4; }
        .badge { display: inline-block; margin-top: 10px; padding: 4px 10px; border-radius: 3px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; background: #333; color: #ccc; }
        .badge-cooked { background: #e67e22; color: white; }
    </style>
</head>
<body>
<div id="history-panel" class="history-panel"><span class="close-btn" onclick="closeHistory()">✕ CLOSE ARENA ANALYTICS</span><h1 id="panel-player-name" style="font-size: 2.5rem; margin-top: 0;">PLAYER</h1><p id="panel-riot-id" style="color: #666; margin-top: -15px;"></p><div style="height: 2px; background: #333; margin: 20px 0;"></div><div id="history-loading">Fetching match history...</div></div>
<div class="arena">
    <div id="left-team" class="team-box"></div>
    <div class="bridge">
        <div id="ff-angle" class="ff-tag">FF ANGLE?</div>
        <div class="search-area"><input type="text" id="target" placeholder="TARGET#TAG" autocomplete="off"><button id="go">EXECUTE SCAN</button></div>
    </div>
    <div id="right-team" class="team-box"></div>
</div>
<script>
    const lTeam = document.getElementById('left-team'), rTeam = document.getElementById('right-team'), ffMsg = document.getElementById('ff-angle'), hPanel = document.getElementById('history-panel');
    let cMap = {}, patch = "14.1.1";
    async function startup() {
        const v = await (await fetch('https://ddragon.leagueoflegends.com/api/versions.json')).json();
        patch = v[0];
        const d = await (await fetch(`https://ddragon.leagueoflegends.com/cdn/${patch}/data/en_US/champion.json`)).json();
        for (let k in d.data) cMap[d.data[k].key] = { name: d.data[k].name, id: d.data[k].id };
    }
    startup();
    function openHistory(p) { if (!p.puuid) return; document.getElementById('panel-player-name').innerText = p.pro_name || p.riotId.split('#')[0]; document.getElementById('panel-riot-id').innerText = p.riotId; hPanel.classList.add('active'); }
    function closeHistory() { hPanel.classList.remove('active'); }
    function render(p) {
        const c = cMap[p.championId] || { name: "Unknown", id: "None" };
        const mTooltip = `On this account: ${p.current_mastery.toLocaleString()} pts\nTotal across all public accounts: ${p.total_mastery.toLocaleString()} pts`;
        const rankImg = (p.rank && p.rank !== 'unranked') ? `url('ranks/${p.rank}.png')` : 'none';
        const mainName = p.pro_name || p.riotId.split('#')[0];
        const subName = p.pro_name ? p.riotId : "";
        return `<div class="card ${p.side === 'ally' ? 'ally-card' : 'enemy-card'} ${p.is_pro ? 'pro-highlight' : ''}" onclick='openHistory(${JSON.stringify(p)})' style="background-image: linear-gradient(rgba(37,37,41,0.3), rgba(37,37,41,0.3)), ${rankImg}"><img class="portrait" src="https://ddragon.leagueoflegends.com/cdn/${patch}/img/champion/${c.id}.png"><div class="details"><div class="champ-title">${c.name}</div><div class="${p.is_pro ? 'pro-label' : 'main-name'}" style="${!p.is_pro ? 'font-size:1.8rem; font-weight:900;' : ''}">${mainName}</div><div class="riot-name">${subName}</div>${!p.is_streamer ? `<div class="mastery-info" data-tooltip="${mTooltip}">Total Mastery: <span>${p.total_mastery.toLocaleString()}</span></div><br>${p.tag ? `<div class="badge ${p.tag.includes('COOKED') ? 'badge-cooked' : ''}">${p.tag}</div>` : ''}` : '<div style="color:#555; font-style:italic;">STREAMER MODE</div>'}</div></div>`;
    }
    async function scan() {
        const val = document.getElementById('target').value.trim();
        if(!val.includes('#')) return;
        try {
            const [n, t] = val.split('#');
            const res = await fetch(`http://127.0.0.1:8000/api/player/${encodeURIComponent(n)}/${encodeURIComponent(t)}`);
            const d = await res.json();
            if(d.status === 'live') {
                lTeam.innerHTML = d.allies.map(p => render(p)).join('');
                rTeam.innerHTML = d.enemies.map(p => render(p)).join('');
                ffMsg.style.display = d.ff_angle ? 'block' : 'none';
            }
        } catch(e) { }
    }
    document.getElementById('go').addEventListener('click', scan);
</script>
</body>
</html>
