<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Tracker</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-top: 10vh;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .search-container {
            display: flex;
            width: 100%;
            max-width: 500px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 1px solid #333;
            border-radius: 8px 0 0 8px;
            background-color: #1e1e1e;
            color: #fff;
            outline: none;
        }

        button {
            padding: 15px 25px;
            font-size: 1.1rem;
            background-color: #5c85d6;
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            font-weight: bold;
        }

        #error-message { color: #ff4d4d; margin-top: 10px; height: 20px; font-size: 0.9rem; }

        #results-container {
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
            display: none;
        }

        .summary-text {
            font-size: 1.1rem;
            color: #a0a0a0;
            margin-bottom: 20px;
            text-align: center;
        }

        .loader {
            display: none;
            margin-top: 20px;
            color: #5c85d6;
        }

        /* --- Match Card --- */
        .match-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        /* Clickable header row */
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-decoration: none;
            color: white;
            border-bottom: 1px solid #2a2a2a;
        }

        .match-header:hover {
            background-color: #2a2a2a;
        }

        .match-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #888;
        }

        .pro-count-badge {
            background-color: #5c85d6;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 999px;
        }

        .match-header-right {
            font-size: 0.85rem;
            color: #5c85d6;
            font-weight: bold;
        }

        /* Pro roster inside the card */
        .pro-roster {
            padding: 0 20px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 16px;
        }

        .pro-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pro-info h2 {
            margin: 0 0 3px 0;
            font-size: 1.1rem;
        }

        .pro-info p {
            margin: 0;
            color: #888;
            font-size: 0.8rem;
        }

        .social-links {
            display: flex;
            gap: 8px;
        }

        .social-links a {
            color: #5c85d6;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            background-color: #2a2a2a;
            padding: 4px 10px;
            border-radius: 5px;
            transition: background-color 0.2s;
        }

        .social-links a:hover {
            background-color: #3a3a3a;
        }

        /* Divider between pros if multiple */
        .pro-divider {
            border: none;
            border-top: 1px solid #2a2a2a;
            margin: 4px 0;
        }
    </style>
</head>
<body>

    <h1>TRACKER</h1>

    <div class="search-container">
        <input type="text" id="riot-input" placeholder="Enter Riot ID (e.g. Faker#KR1)" autocomplete="off">
        <button id="search-btn">Search</button>
    </div>

    <div id="error-message"></div>
    <div id="loader" class="loader">Searching database...</div>
    <div id="results-container"></div>

    <script>
        const searchBtn = document.getElementById('search-btn');
        const riotInput = document.getElementById('riot-input');
        const errorMessage = document.getElementById('error-message');
        const loader = document.getElementById('loader');
        const resultsContainer = document.getElementById('results-container');

        function formatDate(timestampMs) {
            const date = new Date(timestampMs);
            return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function renderResults(data) {
            if (data.matches_found === 0) {
                resultsContainer.innerHTML = `<div class="summary-text">No matches found against pros in our database.</div>`;
                resultsContainer.style.display = 'block';
                return;
            }

            const cardsHtml = data.matches.map(match => {
                const proCount = match.pros.length;
                const proLabel = proCount === 1 ? '1 Pro' : `${proCount} Pros`;

                const rosterHtml = match.pros.map((pro, i) => `
                    ${i > 0 ? '<hr class="pro-divider">' : ''}
                    <div class="pro-row">
                        <div class="pro-info">
                            <h2>${pro.pro_name}</h2>
                            <p>${pro.pro_riot_id}</p>
                        </div>
                        <div class="social-links">
                            ${pro.twitch  ? `<a href="${pro.twitch}"  target="_blank">Twitch</a>`  : ''}
                            ${pro.twitter ? `<a href="${pro.twitter}" target="_blank">Twitter</a>` : ''}
                            ${pro.youtube ? `<a href="${pro.youtube}" target="_blank">YouTube</a>` : ''}
                        </div>
                    </div>
                `).join('');

                return `
                    <div class="match-card">
                        <a href="${match.stats_url}" target="_blank" class="match-header">
                            <div class="match-header-left">
                                <span class="pro-count-badge">${proLabel}</span>
                                <span>Match ${match.match_id.split('_')[1]}</span>
                                <span>•</span>
                                <span>${formatDate(match.timestamp)}</span>
                            </div>
                            <div class="match-header-right">View Stats 📈</div>
                        </a>
                        <div class="pro-roster">
                            ${rosterHtml}
                        </div>
                    </div>
                `;
            }).join('');

            resultsContainer.innerHTML = `
                <div class="summary-text">
                    Found <strong>${data.matches_found}</strong> game${data.matches_found > 1 ? 's' : ''} with pros in the last 30 days!
                </div>
                <div class="match-list">${cardsHtml}</div>
            `;
            resultsContainer.style.display = 'block';
        }

        async function executeSearch() {
            const inputValue = riotInput.value.trim();
            errorMessage.textContent = '';
            resultsContainer.style.display = 'none';

            if (!inputValue.includes('#')) {
                errorMessage.textContent = "Invalid format. Must include a hashtag (e.g., Name#Tag).";
                return;
            }

            const [gameName, tagLine] = inputValue.split('#');
            if (!gameName || !tagLine) {
                errorMessage.textContent = "Invalid format. Missing name or tag.";
                return;
            }

            loader.style.display = 'block';

            try {
                const response = await fetch(`http://localhost:8000/api/search?gameName=${encodeURIComponent(gameName)}&tagLine=${encodeURIComponent(tagLine)}`);

                if (!response.ok) throw new Error("Riot ID not found or server error.");

                const responseData = await response.json();
                loader.style.display = 'none';
                renderResults(responseData);

            } catch (error) {
                loader.style.display = 'none';
                errorMessage.textContent = error.message;
            }
        }

        searchBtn.addEventListener('click', executeSearch);
        riotInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') executeSearch(); });
    </script>
</body>
</html>
