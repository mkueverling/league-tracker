<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Tracker - Fluid Prestige UI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --blue: #3498db; 
            --red: #e74c3c; 
            --gold: #f1c40f; 
            --green: #2ecc71;
            
            /* --- DARK MODE ONLY --- */
            --bg: #242424; 
            --card: #2f2f35; 
            --card-hover: #383840;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a8;
            --border: #404048;
            --panel-bg: #1e1e22;
            --search-bg: #2f2f35;
            --tooltip-bg: #1e1e22;
            --item-bg: #242424;
            --shadow: rgba(0, 0, 0, 0.5);
            --shadow-card: 0 4px 15px rgba(0, 0, 0, 0.2); 
            
            --splash-opacity: 1;
            --text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        body { 
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main); 
            font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif; 
            display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; overflow-x: hidden; 
        }

        /* --- TOP HEADER --- */
        .top-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: var(--card); border-bottom: 1px solid var(--border); box-shadow: var(--shadow-card);
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 30px; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--text-main); letter-spacing: 2px; font-style: italic; }
        
        .region-selector { display: flex; gap: 8px; background: var(--item-bg); padding: 5px; border-radius: 6px; border: 1px solid var(--border); }
        .region-selector span { padding: 4px 12px; font-size: 0.85rem; font-weight: 700; border-radius: 4px; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .region-selector span:hover:not(.disabled) { color: var(--text-main); }
        .region-selector span.active { background: var(--blue); color: #fff; }
        .region-selector span.disabled { opacity: 0.4; cursor: not-allowed; }

        .header-right { display: flex; align-items: center; gap: 20px; }

        /* --- DISCORD BUTTON --- */
        .discord-btn {
            display: flex; align-items: center; gap: 8px; background: #5865F2; color: #fff;
            padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 800;
            text-decoration: none; text-transform: uppercase; border: 1px solid #4752C4;
            box-shadow: var(--shadow-card); transition: 0.2s; cursor: pointer; white-space: nowrap;
        }
        .discord-btn:hover { background: #4752C4; transform: translateY(-2px); }
        .discord-icon { width: 18px; height: 18px; fill: currentColor; }

        /* --- SEARCH AREA --- */
        .search-area { width: clamp(200px, 15vw, 300px); position: relative; }
        .search-container {
            position: relative; background: var(--search-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 15px; display: flex; align-items: center;
            transition: 0.3s;
        }
        .search-container input { background: none; border: none; width: 100%; color: var(--text-main); font-size: 1.1rem; outline: none; }
        .search-icon { position: absolute; right: 15px; opacity: 0.3; font-size: 1.1rem; pointer-events: none; }
        .scan-loader { display: none; position: absolute; right: 15px; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- ARENA GRID --- */
        .arena { 
            position: relative; display: grid; width: 100%; max-width: 95vw; 
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); 
            align-items: flex-start; gap: 8vw; padding: 0 20px; box-sizing: border-box; 
            margin-top: 100px; 
            padding-bottom: 50px;
        }
        .team-box { display: flex; flex-direction: column; gap: clamp(10px, 2vh, 25px); z-index: 5; min-width: 0; }

        /* --- PRESTIGE DATA ROW (NOW 20% TALLER) --- */
        .card { 
            position: relative; 
            /* Height scaled up 20% to leave room for custom signatures & frames */
            height: clamp(100px, 11vh, 170px); 
            background: var(--card); border-radius: 6px; 
            border: 1px solid var(--border); box-shadow: var(--shadow-card); cursor: pointer; transition: 0.2s; opacity: 0; 
            overflow: visible; width: 100%;
        }
        .card:hover { background: var(--card-hover); transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); z-index: 50; }
        .card.unclickable { cursor: default; }
        .card.unclickable:hover { border-color: var(--border) !important; background: var(--card); transform: none; box-shadow: var(--shadow-card); z-index: 1; }

        /* --- STEAM/DISCORD ANIMATED CARD EFFECTS --- */
        .effect-mythic {
            border: 1px solid var(--gold);
            animation: mythicPulse 3s infinite alternate;
        }
        @keyframes mythicPulse {
            0% { box-shadow: 0 0 10px rgba(241, 196, 15, 0.2), inset 0 0 10px rgba(241, 196, 15, 0.1); border-color: rgba(241, 196, 15, 0.4); }
            100% { box-shadow: 0 0 25px rgba(241, 196, 15, 0.7), inset 0 0 30px rgba(241, 196, 15, 0.4); border-color: rgba(241, 196, 15, 1); }
        }

        /* --- TEAM SUMMARY BANNER --- */
        .summary-card { 
            height: clamp(45px, 5vh, 60px) !important; cursor: default; background: var(--search-bg); opacity: 1 !important; 
            z-index: 10; border-style: dashed; animation: fadeIn 0.5s ease forwards;
        }
        .summary-card:hover { transform: none !important; box-shadow: var(--shadow-card) !important; background: var(--search-bg); border-color: var(--border); }
        .summary-content { display: flex; align-items: center; width: 100%; height: 100%; padding: 0 20px; gap: 20px; box-sizing: border-box; }
        .enemy-card.summary-card .summary-content { flex-direction: row-reverse; text-align: right; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- 100% VISIBLE PORTRAIT BACKDROP --- */
        .card-bg-wrapper { position: absolute; inset: 0; overflow: hidden; border-radius: 5px; z-index: 1; }
        
        .champ-splash {
            position: absolute; left: 0; top: 0; bottom: 0; 
            width: 25%; 
            background-size: cover; 
            background-position: center 15%; 
            opacity: var(--splash-opacity); z-index: 0;
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to right, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
        }
        
        .enemy-card .champ-splash {
            left: auto; right: 0;
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to left, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
        }

        .row-content { 
            position: relative; z-index: 5; display: flex; align-items: center; width: 100%; height: 100%; box-sizing: border-box;
        }
        
        .ally-card { border-left: 5px solid var(--blue); animation: slideInLeft 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .ally-card .row-content { flex-direction: row; padding: 0 15px 0 18%; }
        
        .enemy-card { border-right: 5px solid var(--red); animation: slideInRight 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .enemy-card .row-content { flex-direction: row-reverse; padding: 0 18% 0 15px; text-align: right; }

        @keyframes slideInLeft { 0% { opacity: 0; transform: translateX(-40px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { 0% { opacity: 0; transform: translateX(40px); } 100% { opacity: 1; transform: translateX(0); } }

        /* --- ROW COLUMNS --- */
        .identity-group { display: flex; flex-direction: column; justify-content: center; flex: 1.2; min-width: 0; padding: 0 1vw; }
        .enemy-card .identity-group { align-items: flex-end; text-align: right; }
        
        .main-name { font-size: clamp(1rem, 1.2vw, 1.8rem); font-weight: 800; margin: 0; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: var(--text-shadow); max-width: 100%; }
        .pro-label { color: var(--gold); font-size: clamp(1.1rem, 1.4vw, 2rem); font-weight: 900; line-height: 1; margin: 0 0 2px 0; text-transform: uppercase; text-shadow: var(--text-shadow); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        .smurf-tag { font-size: clamp(0.75rem, 0.9vw, 1.2rem); color: var(--text-muted); font-weight: 400; text-shadow: var(--text-shadow); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        
        /* Cursive Em-Dash Quote */
        .mantra-text { font-size: clamp(0.85rem, 1vw, 1.3rem); color: var(--gold); font-family: 'Helvetica Neue', Arial, sans-serif; font-style: italic; font-weight: 400; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: var(--text-shadow); max-width: 100%; opacity: 0.9; }
        
        .mastery-group { display: flex; flex-direction: column; justify-content: center; align-items: center; flex: 0.8; padding: 0 1vw; border-left: 1px solid var(--border); }
        .enemy-card .mastery-group { border-right: 1px solid var(--border); border-left: none; }
        .mastery-label { font-size: clamp(0.55rem, 0.65vw, 0.85rem); color: var(--text-muted); font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; }
        .mastery-score { font-size: clamp(1rem, 1.4vw, 2rem); font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }

        .stats-group { display: flex; flex-direction: column; justify-content: center; padding: 0 1vw; border-left: 1px solid var(--border); border-right: 1px solid var(--border); flex: 1; min-width: 0; }
        .enemy-card .stats-group { border-right: none; border-left: 1px solid var(--border); text-align: right; }
        .stat-line { font-size: clamp(0.8rem, 1vw, 1.3rem); color: var(--text-muted); margin: 3px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stat-highlight { color: var(--text-main); font-weight: 700; }
        .stat-winrate { color: var(--green); font-weight: 800; }
        .stat-winrate-negative { color: var(--red); font-weight: 800; }

        .tags-group { display: flex; flex-direction: row; flex-wrap: wrap; align-content: center; gap: 6px; flex: 0.8; min-width: 0; padding: 0 1vw; }
        .enemy-card .tags-group { justify-content: flex-end; }
        
        .badge { padding: clamp(2px, 0.2vw, 4px) clamp(4px, 0.4vw, 8px); border-radius: 4px; font-size: clamp(0.55rem, 0.65vw, 0.9rem); font-weight: 800; text-transform: uppercase; background: var(--border); color: var(--text-main); width: fit-content; white-space: nowrap; box-shadow: var(--shadow-card); }
        .badge-pro { background: var(--gold); color: #000; border: 1px solid #c29d0b; }
        .badge-cooked { background: #e67e22; color: white; border: none; }
        .badge-ff { background: var(--red); color: white; animation: blink 1s infinite; }
        .badge-insecure { background: transparent; border: 1px dashed var(--text-muted); color: var(--text-muted); box-shadow: none; }

        @keyframes blink { 50% { opacity: 0.5; } }

        /* --- SIDE PANEL & PROFILE --- */
        .history-panel { box-sizing: border-box; position: fixed; right: -420px; top: 0; width: 400px; height: 100vh; background: var(--panel-bg); border-left: 2px solid var(--border); transition: 0.3s; z-index: 200; overflow-y: auto; overflow-x: hidden; }
        .history-panel.active { right: 0; border-left-color: var(--blue); box-shadow: -10px 0 30px var(--shadow); }
        
        .sidebar-content { position: relative; z-index: 10; padding: 30px; }
        .close-btn { cursor: pointer; color: var(--red); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; display: inline-block; font-weight: bold; }

        /* Faded Pro Image Header */
        .sidebar-pro-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 280px;
            background-size: cover; background-position: center top;
            opacity: 0.6; pointer-events: none; z-index: 0;
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 100%);
        }

        .panel-socials { display: flex; gap: 8px; margin: 15px 0; }
        .panel-social-link { font-size: 0.75rem; padding: 4px 10px; background: var(--search-bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text-main); text-decoration: none; font-weight: bold; transition: 0.2s; box-shadow: var(--shadow-card); }
        .panel-social-link:hover { border-color: var(--blue); transform: translateY(-2px); }
        
        .panel-smurfs { margin-top: 15px; }
        .panel-smurfs-title { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; margin-bottom: 8px; letter-spacing: 1px; }
        .panel-smurfs-list { display: flex; flex-direction: column; gap: 4px; }
        .panel-smurfs-list span { font-size: 0.85rem; color: var(--text-main); font-family: monospace; background: var(--item-bg); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); width: fit-content; }

        /* --- SIDEBAR MATCH CARDS --- */
        .match-card { background: var(--card); padding: 12px; margin-bottom: 12px; border-radius: 6px; box-shadow: var(--shadow-card); display: flex; gap: 15px; align-items: center; border: 1px solid var(--border); border-left-width: 4px; }
        .match-champs { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
        .match-champ-icon { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border); }
        .opp-champ { opacity: 0.7; filter: grayscale(40%); width: 30px; height: 30px; }
        .match-details { flex: 1; }
        .item-row { display: flex; gap: 4px; margin-top: 6px; }
        .item-slot { width: 22px; height: 22px; background: var(--item-bg); border: 1px solid var(--border); border-radius: 3px; }
        .item-slot img { width: 100%; height: 100%; border-radius: 2px; object-fit: cover; }

    </style>
</head>

            { puuid: "e3", riotId: "Chovy#GENG", is_streamer: false, champName: "Azir", is_pro: true, pro_name: "Chovy", rank: "Challenger", lp: 1600, total_mastery: 1900000, tag: "Winners Queue", side: "enemy", winrate: "61%", kda: "5.5 / 1.2 / 6.8", socials: { Instagram: "chovy_le" }, smurfs: ["Gen G Chovy"] },
            { puuid: "e2", riotId: "Jgl Diff#NA", is_streamer: false, champName: "Nidalee", is_pro: false, pro_name: null, rank: "Master", lp: 250, total_mastery: 800000, tag: "Winners Queue", side: "enemy", winrate: "52%", kda: "4.8 / 3.5 / 6.1" },
            { puuid: "e4", riotId: "ToxicGuy#123", is_streamer: false, champName: "Draven", is_pro: false, pro_name: null, rank: "Platinum", lp: 99, total_mastery: 1200000, tag: "Losers Queue", side: "enemy", winrate: "49%", kda: "7.1 / 6.2 / 3.5" }
        ]
    };

    // --- MOCK HISTORY DATA FOR SIDEBAR ---
    const mockMatchHistory = [
        { result: "VICTORY", isWin: true, myChamp: "Sion", oppChamp: "Darius", kda: "4 / 2 / 8", time: "2 hours ago", items: [3152, 3047, 3089, 3110] },
        { result: "DEFEAT", isWin: false, myChamp: "Sion", oppChamp: "Aatrox", kda: "1 / 9 / 2", time: "5 hours ago", items: [3152, 3047, 1001] },
        { result: "VICTORY", isWin: true, myChamp: "Gragas", oppChamp: "Malphite", kda: "12 / 2 / 8", time: "1 day ago", items: [3152, 3020, 3089, 3157, 3135] }
    ];

    function renderTeamSummary(teamArray, side) {
        let totalMastery = 0;
        let wrSum = 0;
        let validWrCount = 0;
        
        teamArray.forEach(p => {
            totalMastery += p.total_mastery || 0;
            if (p.winrate && p.winrate !== "0%") {
                wrSum += parseInt(p.winrate);
                validWrCount++;
            }
        });
        
        const avgWrInt = validWrCount ? Math.round(wrSum / validWrCount) : 0;
        const avgWr = validWrCount ? avgWrInt + "%" : "N/A";
        const wrClass = avgWrInt >= 50 ? 'stat-winrate' : 'stat-winrate-negative';

        const formattedMastery = (totalMastery / 1000000).toFixed(1) + "M"; 
        const sideClass = side === 'ally' ? 'ally-card' : 'enemy-card';
        const justify = side === 'ally' ? 'flex-start' : 'flex-end';
        
        return `
        <div class="card summary-card ${sideClass}">
            <div class="summary-content" style="justify-content: ${justify};">
                <div class="stat-highlight" style="font-size: clamp(0.9rem, 1vw, 1.2rem);">TEAM AVG</div>
                <div class="stat-line" style="margin:0;">Winrate: <span class="${wrClass}">${avgWr}</span></div>
                <div class="stat-line" style="margin:0;">True Mastery: <span class="stat-highlight" style="color:var(--gold);">🏆 ${formattedMastery}</span></div>
            </div>
        </div>`;
    }

    function render(p, index) {
        const splashImg = `https://ddragon.leagueoflegends.com/cdn/img/champion/centered/${p.champName}_0.jpg`;
        const clickAction = p.is_streamer ? "" : `onclick='openHistory(${JSON.stringify(p).replace(/'/g, "&#39;")})'`;
        const unclickableClass = p.is_streamer ? 'unclickable' : '';
        const searcherClass = p.is_searcher ? 'searcher-card' : '';
        
        // Dynamic animation class integration
        const effectClass = p.effect ? `effect-${p.effect}` : '';

        // 1. Identity Column (Mantra Em-Dash Added Here)
        let identityHtml = "";
        if (p.is_streamer) {
            identityHtml = `<div class="main-name">HIDDEN</div><div class="smurf-tag">Streamer Mode</div>`;
        } else if (p.is_pro) {
            const mantraHtml = p.mantra ? `<div class="mantra-text">— <i>"${p.mantra}"</i></div>` : '';
            identityHtml = `
                <div class="pro-label">${p.pro_name}</div>
                <div class="smurf-tag">${p.riotId.split('#')[0]}</div>
                ${mantraHtml}
            `;
        } else {
            identityHtml = `<div class="main-name">${p.riotId.split('#')[0]}</div>`;
        }

        // 2. Mastery Column
        let masteryHtml = "";
        if (!p.is_streamer) {
            const masteryMilestone = Math.floor(p.total_mastery / 1000) + "k";
            masteryHtml = `
                <div class="mastery-label">True Mastery</div>
                <div class="mastery-score tooltip-box" data-tooltip="Combined mastery across all known smurf accounts">🏆 ${masteryMilestone}</div>
            `;
        } else {
            masteryHtml = `<div class="mastery-label" style="opacity:0.3;">HIDDEN</div>`;
        }

        // 3. Stats Column
        let statsHtml = "";
        if (!p.is_streamer) {
            const rankDisplay = p.rank !== 'Unranked' ? `${p.rank} <span class="stat-highlight">${p.lp || 0} LP</span>` : 'Unranked';
            const wrInt = parseInt(p.winrate);
            const wrClass = wrInt >= 50 ? 'stat-winrate' : 'stat-winrate-negative';

            statsHtml = `
                <div class="stat-line tooltip-box" data-tooltip="Highest known rank across smurfs">${rankDisplay}</div>
                <div class="stat-line tooltip-box" data-tooltip="Overall Win Rate">WR: <span class="${wrClass}">${p.winrate}</span></div>
                <div class="stat-line tooltip-box" data-tooltip="Average KDA">KDA: <span class="stat-highlight">${p.kda}</span></div>
            `;
        } else {
            statsHtml = `<div class="stat-line">Data Hidden</div>`;
        }

        // 4. Tags Column
        let tagsHtml = '';
        if (p.is_pro) tagsHtml += `<div class="badge badge-pro tooltip-box" data-tooltip="Verified Professional Player">PRO</div>`;
        
        if (!p.is_streamer) {
            if (p.tag) {
                const cookedClass = p.tag.includes("COOKED") ? "badge-cooked" : "";
                tagsHtml += `<div class="badge ${cookedClass} tooltip-box" data-tooltip="${TAG_LOGIC[p.tag]}">${p.tag}</div>`;
            }
            if (p.has_ff_angle) tagsHtml += `<div class="badge badge-ff tooltip-box" data-tooltip="Enemy team has 2+ Winners Queue or 5+ On Fire">FF ANGLE</div>`;
        } else {
            tagsHtml += `<div class="badge badge-insecure tooltip-box" data-tooltip="Hiding identity">INSECURE</div>`;
        }

        return `
            <div class="card ${p.side === 'ally' ? 'ally-card' : 'enemy-card'} ${unclickableClass} ${searcherClass} ${effectClass}" 
                 style="animation-delay: ${index * 0.15}s;" 
                 ${clickAction}>
                
                <div class="card-bg-wrapper">
                    <div class="champ-splash" style="background-image: url('${splashImg}')"></div>
                </div>

                <div class="row-content">
                    <div class="identity-group">
                        ${identityHtml}
                    </div>
                    <div class="mastery-group">
                        ${masteryHtml}
                    </div>
                    <div class="stats-group">
                        ${statsHtml}
                    </div>
                    <div class="tags-group">
                        ${tagsHtml}
                    </div>
                </div>
            </div>`;
    }

    async function executeScan() {
        const rawQuery = document.getElementById('target').value.trim();
        if(!rawQuery.includes('#')) return;
        const query = rawQuery.toLowerCase();

        searchIcon.style.display = 'none';
        scanLoader.style.display = 'block';
        
        lTeam.innerHTML = '';
        rTeam.innerHTML = '';

        await new Promise(r => setTimeout(r, 800)); 

        [...mockLobbyData.allies, ...mockLobbyData.enemies].forEach(p => {
            p.is_searcher = (p.riotId && p.riotId.toLowerCase() === query);
        });

        lTeam.innerHTML = renderTeamSummary(mockLobbyData.allies, 'ally') + mockLobbyData.allies.map((p, index) => render(p, index)).join('');
        rTeam.innerHTML = renderTeamSummary(mockLobbyData.enemies, 'enemy') + mockLobbyData.enemies.map((p, index) => render(p, index)).join('');

        scanLoader.style.display = 'none';
        searchIcon.style.display = 'block';
    }

    // Side Panel Logic
    async function openHistory(p) {
        if (!p.puuid || p.is_streamer) return; 
        isPanelOpen = true;
        hPanel.classList.add('active');
        
        document.getElementById('panel-player-name').innerText = p.pro_name || p.riotId.split('#')[0];
        document.getElementById('panel-riot-id').innerText = p.riotId;
        
        let profileHtml = "";
        let bgHtml = "";

        if (p.is_pro) {
            // Renders REAL image if provided in DB, otherwise leaves it empty!
            if (p.real_img) {
                bgHtml = `<div class="sidebar-pro-bg" style="background-image: url('${p.real_img}')"></div>`;
            }
            
            let socialsHtml = "";
            if (p.socials) {
                for (const [platform, handle] of Object.entries(p.socials)) {
                    socialsHtml += `<a href="#" class="panel-social-link">${platform}: ${handle}</a>`;
                }
            }
            
            let smurfsHtml = "";
            if (p.smurfs && p.smurfs.length > 0) {
                smurfsHtml = `
                    <div class="panel-smurfs">
                        <div class="panel-smurfs-title">Connected Database Accounts</div>
                        <div class="panel-smurfs-list">
                            ${p.smurfs.map(s => `<span>${s}</span>`).join('')}
                        </div>
                    </div>`;
            }

            profileHtml = `
                <div class="panel-socials">${socialsHtml}</div>
                ${smurfsHtml}
            `;
        }
        
        document.getElementById('sidebar-bg-container').innerHTML = bgHtml;
        document.getElementById('panel-profile-section').innerHTML = profileHtml;

        const loadingDiv = document.getElementById('history-loading');
        loadingDiv.innerHTML = `<div style="color: var(--text-muted); font-style: italic; text-align: center; margin-top: 50px;">Fetching Riot Match Database...</div>`;
        
        await new Promise(r => setTimeout(r, 600));

        const historyHtml = mockMatchHistory.map(match => {
            const color = match.isWin ? 'var(--blue)' : 'var(--red)';
            const itemsHtml = match.items.map(id => `<div class="item-slot"><img src="https://ddragon.leagueoflegends.com/cdn/${patch}/img/item/${id}.png" alt="item"></div>`).join('');
            const myImg = `https://ddragon.leagueoflegends.com/cdn/${patch}/img/champion/${match.myChamp}.png`;
            const oppImg = `https://ddragon.leagueoflegends.com/cdn/${patch}/img/champion/${match.oppChamp}.png`;

            return `
            <div class="match-card" style="border-left-color: ${color}">
                <div class="match-champs tooltip-box" data-tooltip="Laned against ${match.oppChamp}">
                    <img src="${myImg}" class="match-champ-icon" alt="${match.myChamp}">
                    <span style="font-size:0.7rem; color:var(--text-muted); font-weight:bold; margin: 0 2px;">VS</span>
                    <img src="${oppImg}" class="match-champ-icon opp-champ" alt="${match.oppChamp}">
                </div>
                <div class="match-details">
                    <div style="color: ${color}; font-weight: 900; font-size: 0.9rem;">${match.result} <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: normal; margin-left: 5px;">${match.time}</span></div>
                    <div style="font-family: monospace; color: var(--text-main); font-size: 1rem; font-weight:bold; margin: 3px 0;">${match.kda}</div>
                    <div class="item-row">${itemsHtml}</div>
                </div>
            </div>`;
        }).join('');

        loadingDiv.innerHTML = historyHtml;
    }

    document.getElementById('target').addEventListener('keypress', e => { 
        if (e.key === 'Enter') executeScan(); 
    });

    document.getElementById('close-panel-btn').addEventListener('click', () => { 
        isPanelOpen = false; hPanel.classList.remove('active'); 
    });

    document.addEventListener('click', (event) => {
        if (isPanelOpen && !hPanel.contains(event.target) && !event.target.closest('.card')) { 
            isPanelOpen = false; hPanel.classList.remove('active'); 
        }
    });
</script>
</body>
</html>
