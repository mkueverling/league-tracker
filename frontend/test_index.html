<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Tracker - Prestige Row UI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --blue: #3498db; 
            --red: #e74c3c; 
            --gold: #f1c40f; 
            --green: #2ecc71;
            
            /* --- SOFT DARK MODE --- */
            --bg: #242424; 
            --card: #2f2f35; 
            --card-hover: #383840;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a8;
            --border: #404048;
            --panel-bg: #1e1e22;
            --search-bg: #2f2f35;
            --tooltip-bg: #1e1e22;
            --item-bg: #242424;
            --shadow: rgba(0, 0, 0, 0.5);
            --shadow-card: 0 4px 15px rgba(0, 0, 0, 0.2); 
            
            /* 100% fully visible image */
            --splash-opacity: 1;
            --text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        body.light-mode {
            /* --- SOFT LIGHT MODE --- */
            --bg: #ebeef1; 
            --card: #ffffff; 
            --card-hover: #f8f9fa;
            --text-main: #2b2b30;
            --text-muted: #757580;
            --border: #d0d4d9;
            --panel-bg: #f8f9fa;
            --search-bg: #ffffff;
            --tooltip-bg: #ffffff;
            --item-bg: #f0f2f5;
            --shadow: rgba(0, 0, 0, 0.15);
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.05); 
            
            /* 100% fully visible image */
            --splash-opacity: 1;
            --text-shadow: none; /* Removed shadow in light mode for cleanliness */
        }

        body { 
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main); 
            font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; 
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- THEME TOGGLE --- */
        .theme-toggle {
            position: absolute; top: 20px; right: 20px;
            background: var(--search-bg); border: 1px solid var(--border); color: var(--text-main);
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem;
            z-index: 1000; transition: 0.2s; box-shadow: var(--shadow-card);
        }
        .theme-toggle:hover { border-color: var(--blue); transform: scale(1.05); }

        /* --- ARENA GRID --- */
        .arena { 
            position: relative; display: grid; width: 100%; max-width: 1700px; 
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr); 
            align-items: center; gap: 30px; padding: 0 20px; box-sizing: border-box; 
        }
        .team-box { display: flex; flex-direction: column; gap: 10px; z-index: 5; min-width: 0; }

        /* --- DYNAMIC LASER CANVAS --- */
        .laser-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        #laser-beam { fill: none; stroke: var(--blue); stroke-width: 2px; opacity: 0; stroke-linecap: square; stroke-linejoin: miter; transition: stroke 0.3s; }

        /* --- SEARCH AREA --- */
        .search-area { width: 300px; position: relative; z-index: 10; }
        .search-container {
            position: relative; background: var(--search-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 15px; display: flex; align-items: center;
            box-shadow: var(--shadow-card); transition: 0.3s;
        }
        .search-container input { background: none; border: none; width: 100%; color: var(--text-main); font-size: 1.2rem; outline: none; }
        .search-icon { position: absolute; right: 15px; opacity: 0.3; font-size: 1.1rem; pointer-events: none; }
        .scan-loader { display: none; position: absolute; right: 15px; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- PRESTIGE DATA ROW --- */
        .card { 
            position: relative; height: 95px; background: var(--card); border-radius: 6px; 
            border: 1px solid var(--border); box-shadow: var(--shadow-card); cursor: pointer; transition: 0.2s; opacity: 0; 
            overflow: visible; width: 100%;
        }
        .card:hover { border-color: #7abaff; background: var(--card-hover); transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); z-index: 50; }
        .card.unclickable { cursor: default; }
        .card.unclickable:hover { border-color: var(--border) !important; background: var(--card); transform: none; box-shadow: var(--shadow-card); z-index: 1; }

        /* --- 100% VISIBLE PORTRAIT BACKDROP --- */
        .card-bg-wrapper { position: absolute; inset: 0; overflow: hidden; border-radius: 5px; z-index: 1; }
        
        .champ-splash {
            position: absolute; left: 0; top: 0; bottom: 0; 
            width: 25%; /* Reduced to give text more space */
            background-size: cover; 
            background-position: center 15%; /* Frames the face perfectly */
            opacity: var(--splash-opacity); z-index: 0; transition: opacity 0.3s;
            /* Fades out sharply to solid background before the text starts */
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to right, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
        }
        
        .enemy-card .champ-splash {
            left: auto; right: 0;
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to left, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
        }

        .row-content { 
            position: relative; z-index: 5; display: flex; align-items: center; width: 100%; height: 100%; box-sizing: border-box;
        }
        
        /* Text padding adjusted perfectly to match the 25% image */
        .ally-card { border-left: 5px solid var(--blue); animation: slideInLeft 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .ally-card .row-content { flex-direction: row; padding: 0 15px 0 18%; }
        
        .enemy-card { border-right: 5px solid var(--red); animation: slideInRight 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .enemy-card .row-content { flex-direction: row-reverse; padding: 0 18% 0 15px; text-align: right; }

        @keyframes slideInLeft { 0% { opacity: 0; transform: translateX(-40px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { 0% { opacity: 0; transform: translateX(40px); } 100% { opacity: 1; transform: translateX(0); } }

        /* --- ROW COLUMNS --- */
        .identity-group { display: flex; flex-direction: column; justify-content: center; flex: 1; min-width: 0; padding: 0 10px; }
        .enemy-card .identity-group { align-items: flex-end; text-align: right; }
        
        .main-name { font-size: 1.2rem; font-weight: 800; margin: 0; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: var(--text-shadow); max-width: 100%; }
        .pro-label { color: var(--gold); font-size: 1.2rem; font-weight: 900; line-height: 1; margin: 0 0 2px 0; text-transform: uppercase; text-shadow: var(--text-shadow); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        .smurf-tag { font-size: 0.8rem; color: var(--text-muted); font-weight: 400; text-shadow: var(--text-shadow); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        .mantra-text { font-size: 0.8rem; color: var(--gold); font-style: italic; font-weight: 700; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: var(--text-shadow); max-width: 100%; }
        
        .stats-group { display: flex; flex-direction: column; justify-content: center; padding: 0 15px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); flex-shrink: 0; width: 140px; /* Locked width for alignment */ }
        .enemy-card .stats-group { text-align: right; }
        .stat-line { font-size: 0.85rem; color: var(--text-muted); margin: 2px 0; white-space: nowrap; }
        .stat-highlight { color: var(--text-main); font-weight: 700; }
        .stat-winrate { color: var(--green); font-weight: 800; }

        .tags-group { display: flex; flex-direction: column; gap: 4px; justify-content: center; flex-shrink: 0; padding: 0 10px; width: 110px; /* Locked width for alignment */ }
        .enemy-card .tags-group { align-items: flex-end; }
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; background: var(--border); color: var(--text-main); width: fit-content; white-space: nowrap; box-shadow: var(--shadow-card); }
        .badge-pro { background: var(--gold); color: #000; border: 1px solid #c29d0b; }
        .badge-cooked { background: #e67e22; color: white; border: none; }
        .badge-ff { background: var(--red); color: white; animation: blink 1s infinite; }
        .badge-insecure { background: transparent; border: 1px dashed var(--text-muted); color: var(--text-muted); box-shadow: none; }

        @keyframes blink { 50% { opacity: 0.5; } }

        /* --- TOOLTIPS --- */
        .tooltip-box { position: relative; cursor: help; }
        .tooltip-box:hover::after {
            content: attr(data-tooltip); position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
            background: var(--tooltip-bg); color: var(--text-main); padding: 6px 12px; border-radius: 4px; font-size: 0.75rem; width: max-content; max-width: 220px; 
            text-align: center; border: 1px solid var(--border); z-index: 100; white-space: normal; line-height: 1.4;
            font-family: 'Roboto', sans-serif; box-shadow: 0 4px 15px var(--shadow); pointer-events: none;
        }

        /* --- SIDE PANEL & PROFILE --- */
        .history-panel { box-sizing: border-box; position: fixed; right: -420px; top: 0; width: 400px; height: 100vh; background: var(--panel-bg); border-left: 2px solid var(--border); transition: 0.3s; z-index: 100; padding: 30px; overflow-y: auto; }
        .history-panel.active { right: 0; border-left-color: var(--blue); box-shadow: -10px 0 30px var(--shadow); }
        .close-btn { cursor: pointer; color: var(--red); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; display: inline-block; font-weight: bold; }

        .panel-profile-container { display: flex; gap: 15px; margin-top: 15px; align-items: center; }
        .panel-avatar { width: 65px; height: 65px; border-radius: 8px; border: 2px solid var(--border); object-fit: cover; }
        .panel-socials { display: flex; gap: 8px; margin-bottom: 5px; }
        .panel-social-link { font-size: 0.65rem; padding: 3px 6px; background: var(--search-bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); text-decoration: none; text-transform: uppercase; font-weight: bold; transition: 0.2s; }
        .panel-social-link:hover { color: var(--blue); border-color: var(--blue); }
        .panel-smurfs { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; }
        .panel-smurfs span { color: var(--text-main); font-family: monospace; background: var(--item-bg); padding: 2px 5px; border-radius: 3px; margin-right: 4px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<button id="theme-toggle" class="theme-toggle">☀️</button>

<div id="history-panel" class="history-panel">
    <span class="close-btn" id="close-panel-btn">✕ CLOSE</span>
    <h1 id="panel-player-name" style="font-size: 2.5rem; margin-top: 0;">PLAYER</h1>
    <p id="panel-riot-id" style="color: var(--text-muted); margin-top: -15px;"></p>
    <div id="panel-profile-section"></div>
    <div style="height: 2px; background: var(--border); margin: 20px 0;"></div>
    <div id="history-loading">Fetching match history...</div>
</div>

<div class="arena" id="arena">
    <svg id="laser-canvas" class="laser-canvas">
        <path id="laser-beam" d="" />
    </svg>

    <div id="left-team" class="team-box"></div>
    <div class="bridge">
        <div class="search-area">
            <div class="search-container" id="search-container">
                <input type="text" id="target" placeholder="TARGET#TAG" autocomplete="off">
                <div id="search-icon" class="search-icon">🔍</div>
                <div id="scan-loader" class="scan-loader"></div>
            </div>
        </div>
    </div>
    <div id="right-team" class="team-box"></div>
</div>

<script>
    const lTeam = document.getElementById('left-team');
    const rTeam = document.getElementById('right-team');
    const hPanel = document.getElementById('history-panel');
    const scanLoader = document.getElementById('scan-loader');
    const searchIcon = document.getElementById('search-icon');
    const themeToggle = document.getElementById('theme-toggle');
    let patch = "14.8.1"; 

    let isPanelOpen = false;

    // --- THEME TOGGLE ---
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        themeToggle.innerText = document.body.classList.contains('light-mode') ? '🌙' : '☀️';
    });

    const TAG_LOGIC = {
        "On Fire": "Won 3 games in a row",
        "Winners Queue": "Won 5 games in a row",
        "Unlucky": "Lost 3 games in a row",
        "Losers Queue": "Lost 5 games in a row",
        "YOU'RE COOKED": "Winners Queue + over 200,000 Real Mastery"
    };

    // --- MOCK DATA ---
    const mockLobbyData = {
        allies: [
            { puuid: "a4", riotId: "SloppyWalrus#NA", is_streamer: false, champName: "Gragas", is_pro: true, pro_name: "Sloppy Walrus", rank: "Master", lp: 310, total_mastery: 2500000, tag: "Winners Queue", side: "ally", mantra: "BOMBA", winrate: "58%", kda: "3.2 / 4.1 / 8.5" },
            { puuid: "a2", riotId: "Oner#T1", is_streamer: false, champName: "LeeSin", is_pro: true, pro_name: "Oner", rank: "Challenger", lp: 850, total_mastery: 2100000, tag: "On Fire", side: "ally", winrate: "54%", kda: "4.1 / 2.8 / 7.2" },
            { puuid: "a5", riotId: "Autofilled Support", is_streamer: true, champName: "Yuumi", is_pro: false, pro_name: null, rank: "Unranked", total_mastery: 0, tag: null, side: "ally", winrate: "0%", kda: "0 / 0 / 0" },
            { puuid: "a1", riotId: "Thebausffs#EUW", is_streamer: false, champName: "Sion", is_pro: true, pro_name: "Thebausffs", rank: "Challenger", lp: 1120, total_mastery: 4500000, tag: "YOU'RE COOKED", side: "ally", mantra: "Solo Bolo", winrate: "51%", kda: "2.1 / 9.5 / 4.2" },
            { puuid: "a3", riotId: "Faker#T1", is_streamer: false, champName: "Akali", is_pro: true, pro_name: "Faker", rank: "Challenger", lp: 1420, total_mastery: 2500000, tag: "YOU'RE COOKED", side: "ally", mantra: "All roads lead to me.", winrate: "56%", kda: "6.5 / 2.1 / 5.5" }
        ],
        enemies: [
            { puuid: "e5", riotId: "NoVision#GG", is_streamer: false, champName: "Nautilus", is_pro: false, pro_name: null, rank: "Emerald", lp: 12, total_mastery: 50000, tag: "Unlucky", side: "enemy", winrate: "48%", kda: "1.2 / 6.5 / 12.1" },
            { puuid: "e1", riotId: "TopDiff", is_streamer: true, champName: "Darius", is_pro: false, pro_name: null, rank: "Unranked", total_mastery: 0, tag: null, side: "enemy", winrate: "0%", kda: "0 / 0 / 0" },
            { puuid: "e3", riotId: "Chovy#GENG", is_streamer: false, champName: "Azir", is_pro: true, pro_name: "Chovy", rank: "Challenger", lp: 1600, total_mastery: 1900000, tag: "Winners Queue", side: "enemy", winrate: "61%", kda: "5.5 / 1.2 / 6.8" },
            { puuid: "e2", riotId: "Jgl Diff#NA", is_streamer: false, champName: "Nidalee", is_pro: false, pro_name: null, rank: "Master", lp: 250, total_mastery: 800000, tag: "Winners Queue", side: "enemy", winrate: "52%", kda: "4.8 / 3.5 / 6.1" },
            { puuid: "e4", riotId: "ToxicGuy#123", is_streamer: false, champName: "Draven", is_pro: false, pro_name: null, rank: "Platinum", lp: 99, total_mastery: 1200000, tag: "Losers Queue", side: "enemy", winrate: "49%", kda: "7.1 / 6.2 / 3.5" }
        ]
    };

    function render(p, index) {
        const splashImg = `https://ddragon.leagueoflegends.com/cdn/img/champion/centered/${p.champName}_0.jpg`;
        const clickAction = p.is_streamer ? "" : `onclick='openHistory(${JSON.stringify(p).replace(/'/g, "&#39;")})'`;
        const unclickableClass = p.is_streamer ? 'unclickable' : '';
        const searcherClass = p.is_searcher ? 'searcher-card' : '';

        // 1. Identity Column (STACKED PRO LABEL & SMURF TAG)
        let identityHtml = "";
        if (p.is_streamer) {
            identityHtml = `<div class="main-name">HIDDEN</div><div class="smurf-tag">Streamer Mode</div>`;
        } else if (p.is_pro) {
            const mantraHtml = p.mantra ? `<div class="mantra-text">"${p.mantra}"</div>` : '';
            identityHtml = `
                <div class="pro-label">${p.pro_name}</div>
                <div class="smurf-tag">${p.riotId.split('#')[0]}</div>
                ${mantraHtml}
            `;
        } else {
            identityHtml = `<div class="main-name">${p.riotId.split('#')[0]}</div>`;
        }

        // 2. Stats Column
        let statsHtml = "";
        if (!p.is_streamer) {
            const rankDisplay = p.rank !== 'Unranked' ? `${p.rank} <span class="stat-highlight">${p.lp || 0} LP</span>` : 'Unranked';
            statsHtml = `
                <div class="stat-line tooltip-box" data-tooltip="Highest known rank across smurfs">${rankDisplay}</div>
                <div class="stat-line tooltip-box" data-tooltip="Overall Win Rate">WR: <span class="stat-winrate">${p.winrate}</span></div>
                <div class="stat-line tooltip-box" data-tooltip="Average KDA">KDA: <span class="stat-highlight">${p.kda}</span></div>
            `;
        } else {
            statsHtml = `<div class="stat-line">Data Hidden</div>`;
        }

        // 3. Tags Column
        let tagsHtml = '';
        if (p.is_pro) tagsHtml += `<div class="badge badge-pro tooltip-box" data-tooltip="Verified Professional Player">PRO</div>`;
        
        if (!p.is_streamer) {
            if (p.tag) {
                const cookedClass = p.tag.includes("COOKED") ? "badge-cooked" : "";
                tagsHtml += `<div class="badge ${cookedClass} tooltip-box" data-tooltip="${TAG_LOGIC[p.tag]}">${p.tag}</div>`;
            }
            if (p.has_ff_angle) tagsHtml += `<div class="badge badge-ff tooltip-box" data-tooltip="Enemy team has 2+ Winners Queue or 5+ On Fire">FF ANGLE</div>`;
            
            const masteryMilestone = Math.floor(p.total_mastery / 1000) + "k";
            tagsHtml += `<div class="badge tooltip-box" data-tooltip="True Combined Mastery">🏆 ${masteryMilestone}</div>`;
        } else {
            tagsHtml += `<div class="badge badge-insecure tooltip-box" data-tooltip="Hiding identity">INSECURE</div>`;
        }

        return `
            <div class="card ${p.side === 'ally' ? 'ally-card' : 'enemy-card'} ${unclickableClass} ${searcherClass}" 
                 style="animation-delay: ${index * 0.15}s;" 
                 ${clickAction}>
                
                <div class="card-bg-wrapper">
                    <div class="champ-splash" style="background-image: url('${splashImg}')"></div>
                </div>

                <div class="row-content">
                    <div class="identity-group">
                        ${identityHtml}
                    </div>
                    <div class="stats-group">
                        ${statsHtml}
                    </div>
                    <div class="tags-group">
                        ${tagsHtml}
                    </div>
                </div>
            </div>`;
    }

    // --- LASER LOGIC ---
    function fireLaser() {
        const searchBox = document.getElementById('search-container');
        const targetCard = document.querySelector('.searcher-card');
        const svgCanvas = document.getElementById('laser-canvas');
        const laser = document.getElementById('laser-beam');

        if (!searchBox || !targetCard || !laser) return;

        const delaySeconds = parseFloat(targetCard.style.animationDelay) || 0;
        const boxRect = searchBox.getBoundingClientRect();
        const cardRect = targetCard.getBoundingClientRect();
        const svgRect = svgCanvas.getBoundingClientRect();

        const isAlly = targetCard.classList.contains('ally-card');

        const boxCenterX = (boxRect.left + boxRect.width / 2) - svgRect.left;
        const boxCenterY = (boxRect.top + boxRect.height / 2) - svgRect.top;
        const cardCenterY = (cardRect.top + cardRect.height / 2) - svgRect.top;

        let startX, startY, endX, endY, pathString;

        endX = isAlly ? (cardRect.right - svgRect.left) : (cardRect.left - svgRect.left);
        endY = cardCenterY;

        if (Math.abs(boxCenterY - cardCenterY) < 30) {
            startX = isAlly ? (boxRect.left - svgRect.left) : (boxRect.right - svgRect.left);
            startY = boxCenterY;
            pathString = `M ${startX} ${startY} L ${endX} ${endY}`;
        } else {
            const isAbove = cardCenterY < boxCenterY;
            startX = boxCenterX;
            startY = isAbove ? (boxRect.top - svgRect.top) : (boxRect.bottom - svgRect.top);
            pathString = `M ${startX} ${startY} L ${startX} ${endY} L ${endX} ${endY}`;
        }

        const color = isAlly ? "var(--blue)" : "var(--red)";
        laser.style.stroke = color;
        laser.style.filter = `drop-shadow(0 0 3px ${color})`; 
        laser.setAttribute('d', pathString);
        
        laser.style.transition = 'none';
        const length = laser.getTotalLength();
        laser.style.strokeDasharray = length;
        laser.style.strokeDashoffset = length;
        laser.style.opacity = '0.35';

        void laser.offsetWidth; 

        laser.style.transition = `stroke-dashoffset 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) ${delaySeconds}s`;
        laser.style.strokeDashoffset = '0';
    }

    window.addEventListener('resize', fireLaser);

    async function executeScan() {
        const rawQuery = document.getElementById('target').value.trim();
        if(!rawQuery.includes('#')) return;
        const query = rawQuery.toLowerCase();

        searchIcon.style.display = 'none';
        scanLoader.style.display = 'block';
        
        lTeam.innerHTML = '';
        rTeam.innerHTML = '';
        const laser = document.getElementById('laser-beam');
        if(laser) {
            laser.style.transition = 'none';
            laser.style.opacity = '0';
            laser.setAttribute('d', '');
        }

        await new Promise(r => setTimeout(r, 800)); 

        [...mockLobbyData.allies, ...mockLobbyData.enemies].forEach(p => {
            p.is_searcher = (p.riotId && p.riotId.toLowerCase() === query);
        });

        let wQueueCount = 0, onFireCount = 0;
        mockLobbyData.enemies.forEach(e => {
            if (e.tag === "Winners Queue" || e.tag === "YOU'RE COOKED") wQueueCount++;
            if (e.tag === "On Fire") onFireCount++;
        });
        const ffConditionMet = (wQueueCount >= 2) || ((onFireCount + wQueueCount) >= 5);

        mockLobbyData.allies.forEach(p => { 
            if (p.is_searcher) p.has_ff_angle = ffConditionMet; 
        });

        lTeam.innerHTML = mockLobbyData.allies.map((p, index) => render(p, index)).join('');
        rTeam.innerHTML = mockLobbyData.enemies.map((p, index) => render(p, index)).join('');

        scanLoader.style.display = 'none';
        searchIcon.style.display = 'block';

        setTimeout(fireLaser, 50);
    }

    // Side Panel Logic
    async function openHistory(p) {
        if (!p.puuid || p.is_streamer) return; 
        isPanelOpen = true;
        hPanel.classList.add('active');
        
        document.getElementById('panel-player-name').innerText = p.pro_name || p.riotId.split('#')[0];
        document.getElementById('panel-riot-id').innerText = p.riotId;
        
        document.getElementById('history-loading').innerHTML = `<div style="color: var(--text-muted); font-style: italic; text-align: center; margin-top: 50px;">Fetching Riot Match Database...</div>`;
    }

    document.getElementById('target').addEventListener('keypress', e => { 
        if (e.key === 'Enter') executeScan(); 
    });

    document.getElementById('close-panel-btn').addEventListener('click', () => { 
        isPanelOpen = false; hPanel.classList.remove('active'); 
    });

    document.addEventListener('click', (event) => {
        if (isPanelOpen && !hPanel.contains(event.target) && !event.target.closest('.card')) { 
            isPanelOpen = false; hPanel.classList.remove('active'); 
        }
    });
</script>
</body>
</html>
