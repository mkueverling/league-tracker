<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Tracker - Fluid Prestige UI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --blue: #3498db; 
            --red: #e74c3c; 
            --gold: #f1c40f; 
            --green: #2ecc71;
            --purple: #9b59b6;
            
            /* --- DARK MODE ONLY --- */
            --bg: #242424; 
            --card: #2f2f35; 
            --card-hover: #383840;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a8;
            --border: #404048;
            --panel-bg: #1e1e22;
            --search-bg: #2f2f35;
            --tooltip-bg: #1e1e22;
            --item-bg: #242424;
            --shadow: rgba(0, 0, 0, 0.5);
            --shadow-card: 0 4px 15px rgba(0, 0, 0, 0.2); 
            
            --splash-opacity: 1;
            --text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        body { 
            margin: 0; padding: 70px 0 0 0; background-color: var(--bg); color: var(--text-main); 
            font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; 
            box-sizing: border-box;
        }

        /* --- TOP HEADER --- */
        .top-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: var(--card); border-bottom: 1px solid var(--border); box-shadow: var(--shadow-card);
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15vw; 
            box-sizing: border-box; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 30px; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--text-main); letter-spacing: 2px; font-style: italic; }
        
        .region-selector { display: flex; gap: 8px; background: var(--item-bg); padding: 5px; border-radius: 6px; border: 1px solid var(--border); }
        .region-selector span { padding: 4px 12px; font-size: 0.85rem; font-weight: 700; border-radius: 4px; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .region-selector span:hover:not(.disabled) { color: var(--text-main); }
        .region-selector span.active { background: var(--blue); color: #fff; }
        .region-selector span.disabled { opacity: 0.4; cursor: not-allowed; }

        .header-right { display: flex; align-items: center; gap: 15px; }

        /* --- HEADER BUTTONS --- */
        .share-btn {
            display: flex; align-items: center; gap: 6px; background: var(--search-bg); color: var(--text-main);
            padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 800;
            text-decoration: none; text-transform: uppercase; border: 1px solid var(--border);
            box-shadow: var(--shadow-card); transition: 0.2s; cursor: pointer; white-space: nowrap; outline: none;
        }
        .share-btn:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-2px); }

        .discord-btn {
            display: flex; align-items: center; gap: 8px; background: #5865F2; color: #fff;
            padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 800;
            text-decoration: none; text-transform: uppercase; border: 1px solid #4752C4;
            box-shadow: var(--shadow-card); transition: 0.2s; cursor: pointer; white-space: nowrap;
        }
        .discord-btn:hover { background: #4752C4; transform: translateY(-2px); }

        /* --- SEARCH AREA --- */
        .search-area { width: clamp(200px, 15vw, 250px); position: relative; }
        .search-container {
            position: relative; background: var(--search-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 15px; display: flex; align-items: center;
            transition: 0.3s;
        }
        .search-container input { background: none; border: none; width: 100%; color: var(--text-main); font-size: 1.1rem; outline: none; }
        .search-icon { position: absolute; right: 15px; opacity: 0.3; font-size: 1.1rem; pointer-events: none; }
        .scan-loader { display: none; position: absolute; right: 15px; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- FLEXBOX SPACERS FOR PERFECT CENTERING --- */
        .top-zone {
            flex: 1; /* Takes up 50% of the remaining vertical space */
            width: 100%;
            display: flex;
            align-items: center; /* Suspends Game Info exactly in the middle of this zone */
            justify-content: center;
            min-height: 40px; /* Prevents crushing on very small screens */
            padding: 10px 20px;
            box-sizing: border-box;
            z-index: 10;
        }
        
        .bottom-zone {
            flex: 1; /* Takes up the other 50%, perfectly balancing the top-zone */
            width: 100%;
            min-height: 20px;
        }

        /* --- TACTICAL INTEL TEXT --- */
        .intel-banner-container { width: 100%; display: flex; justify-content: center; }
        .intel-banner {
            width: 100%; max-width: 95vw; display: none; align-items: center; justify-content: center; gap: 10px;
            animation: fadeInDown 0.5s ease forwards;
        }
        .intel-text { font-size: clamp(0.9rem, 1vw, 1.15rem); color: var(--text-main); font-style: italic; line-height: 1.6; text-align: center; width: 100%; }
        .intel-accent { color: var(--gold); font-weight: 900; font-style: normal; letter-spacing: 1px; text-transform: uppercase; margin-right: 6px; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ARENA GRID --- */
        .arena { 
            position: relative; display: grid; width: 100%; max-width: 95vw; 
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); 
            align-items: flex-start; gap: 8vw; padding: 0 20px; box-sizing: border-box; 
            flex: none; /* Keeps its natural height, letting the top/bottom zones stretch */
        }
        .team-box { display: flex; flex-direction: column; gap: clamp(10px, 2vh, 25px); z-index: 5; min-width: 0; }

        /* --- PRESTIGE DATA ROW --- */
        .card { 
            position: relative; 
            height: clamp(100px, 11vh, 170px); 
            background: var(--card); border-radius: 6px; 
            border: 1px solid var(--border); box-shadow: var(--shadow-card); cursor: pointer; transition: 0.2s; opacity: 0; 
            overflow: visible; width: 100%;
        }
        .card:hover { background: var(--card-hover); transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); z-index: 50; }
        .card.unclickable { cursor: default; }
        .card.unclickable:hover { border-color: var(--border) !important; background: var(--card); transform: none; box-shadow: var(--shadow-card); z-index: 1; }

        /* --- FLOATING CONNECTION TABS --- */
        .connection-tab {
            position: absolute;
            top: -12px;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 4px;
            z-index: 20;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            cursor: help;
            white-space: nowrap;
        }
        .ally-card .connection-tab { right: 20px; }
        .enemy-card .connection-tab { left: 20px; }
        
        .tab-nemesis { background: linear-gradient(135deg, #8e44ad, #c0392b); } /* Perfect Mirror */
        .tab-familiar { background: linear-gradient(135deg, #2980b9, #27ae60); }
        .tab-highlight { color: var(--gold); margin-left: 6px; }

        /* --- TEAM SUMMARY BANNER --- */
        .summary-card { 
            height: clamp(55px, 6vh, 70px) !important; cursor: default; background: var(--search-bg); opacity: 1 !important; 
            z-index: 10; border-style: dashed; animation: fadeIn 0.5s ease forwards;
        }
        .summary-card:hover { transform: none !important; box-shadow: var(--shadow-card) !important; background: var(--search-bg); border-color: var(--border); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- STEAM/DISCORD ANIMATED CARD EFFECTS --- */
        .effect-mythic {
            border: 1px solid var(--gold);
            animation: mythicPulse 3s infinite alternate;
        }
        @keyframes mythicPulse {
            0% { box-shadow: 0 0 10px rgba(241, 196, 15, 0.2), inset 0 0 10px rgba(241, 196, 15, 0.1); border-color: rgba(241, 196, 15, 0.4); }
            100% { box-shadow: 0 0 25px rgba(241, 196, 15, 0.7), inset 0 0 30px rgba(241, 196, 15, 0.4); border-color: rgba(241, 196, 15, 1); }
        }

        /* --- 100% VISIBLE PORTRAIT BACKDROP --- */
        .card-bg-wrapper { position: absolute; inset: 0; overflow: hidden; border-radius: 5px; z-index: 1; }
        
        .champ-splash {
            position: absolute; left: 0; top: 0; bottom: 0; 
            width: 25%; 
            background-size: 150%; 
            background-position: center 20%; 
            opacity: var(--splash-opacity); z-index: 0;
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to right, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
        }
        
        .enemy-card .champ-splash {
            left: auto; right: 0;
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to left, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
        }

        .row-content { 
            position: absolute; inset: 0; z-index: 5; display: flex; align-items: center; width: 100%; height: 100%; box-sizing: border-box;
        }
        
        .ally-card { border-left: 5px solid var(--blue); animation: slideInLeft 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .ally-card .row-content { flex-direction: row; padding: 0 15px 0 18%; }
        
        .enemy-card { border-right: 5px solid var(--red); animation: slideInRight 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .enemy-card .row-content { flex-direction: row-reverse; padding: 0 18% 0 15px; text-align: right; }

        @keyframes slideInLeft { 0% { opacity: 0; transform: translateX(-40px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { 0% { opacity: 0; transform: translateX(40px); } 100% { opacity: 1; transform: translateX(0); } }

        /* --- ROW COLUMNS WITH CONTAINER QUERIES --- */
        .identity-group { 
            display: flex; flex-direction: column; justify-content: center; flex: 1.2; min-width: 0; padding: 0 1vw; 
            container-type: inline-size; 
        }
        .enemy-card .identity-group { align-items: flex-end; text-align: right; }
        
        .riot-id-wrapper { display: flex; align-items: baseline; width: 100%; }
        .enemy-card .riot-id-wrapper { justify-content: flex-end; }
        
        .main-name { font-size: clamp(0.8rem, 10cqw, 1.8rem); font-weight: 800; margin: 0; color: var(--text-main); }
        .pro-label { color: var(--gold); font-size: clamp(0.9rem, 12cqw, 2rem); font-weight: 900; line-height: 1; margin: 0 0 2px 0; text-transform: uppercase; text-shadow: var(--text-shadow); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .smurf-tag { font-size: clamp(0.6rem, 8cqw, 1.2rem); color: var(--text-muted); font-weight: 400; text-shadow: var(--text-shadow); }
        
        .truncate-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; }
        .ladder-rank { color: var(--gold); font-weight: 900; margin: 0 6px; font-size: 0.95em; flex-shrink: 0; }

        .mantra-text { font-size: clamp(0.7rem, 9cqw, 1.3rem); color: var(--gold); font-family: 'Helvetica Neue', Arial, sans-serif; font-style: italic; font-weight: 400; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: var(--text-shadow); width: 100%; opacity: 0.9; }
        
        /* Mastery Column */
        .mastery-group { display: flex; flex-direction: column; justify-content: center; align-items: center; flex: 0.8; padding: 0 1vw; border-left: 1px solid var(--border); }
        .enemy-card .mastery-group { border-right: 1px solid var(--border); border-left: none; }
        .mastery-label { font-size: clamp(0.55rem, 0.65vw, 0.85rem); color: var(--text-muted); font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; text-align: center; }
        .mastery-score { font-size: clamp(1rem, 1.4vw, 2rem); font-weight: 900; color: var(--text-main); text-shadow: var(--text-shadow); } 

        /* Stats Column */
        .stats-group { display: flex; flex-direction: column; justify-content: center; padding: 0 1vw; border-left: 1px solid var(--border); border-right: 1px solid var(--border); flex: 1; min-width: 0; }
        .enemy-card .stats-group { border-right: none; border-left: 1px solid var(--border); text-align: left; }
        .stat-line { font-size: clamp(0.8rem, 1vw, 1.3rem); color: var(--text-muted); margin: 3px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stat-highlight { color: var(--text-main); font-weight: 700; }
        .stat-winrate { color: var(--green); font-weight: 800; }
        .stat-winrate-negative { color: var(--red); font-weight: 800; }

        /* Tags Column */
        .tags-group { display: flex; flex-direction: row; flex-wrap: wrap; align-content: center; gap: 6px; flex: 0.8; min-width: 0; padding: 0 1vw; }
        .enemy-card .tags-group { justify-content: flex-end; }
        
        /* Glass-Style Tags */
        .badge { 
            padding: clamp(2px, 0.2vw, 4px) clamp(4px, 0.4vw, 8px); border-radius: 4px; 
            font-size: clamp(0.55rem, 0.65vw, 0.9rem); font-weight: 800; text-transform: uppercase; 
            width: fit-content; white-space: nowrap; 
        }
        .badge-positive { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
        .badge-negative { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.3); }
        .badge-neutral { background: rgba(52, 152, 219, 0.15); color: #3498db; border: 1px solid rgba(52, 152, 219, 0.3); }
        .badge-pro { background: rgba(241, 196, 15, 0.15); color: #f1c40f; border: 1px solid rgba(241, 196, 15, 0.4); box-shadow: 0 0 8px rgba(241, 196, 15, 0.1); }
        .badge-otp { background: rgba(155, 89, 182, 0.15); color: #9b59b6; border: 1px solid rgba(155, 89, 182, 0.3); }
        .badge-special { background: linear-gradient(135deg, rgba(142, 68, 173, 0.8), rgba(41, 128, 185, 0.8)); color: white; border: 1px solid #9b59b6; box-shadow: 0 0 8px rgba(155, 89, 182, 0.3); }
        .badge-insecure { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.3); }

        /* --- TOOLTIPS --- */
        .tooltip-box { position: relative; cursor: help; }
        .tooltip-box:hover::after {
            content: attr(data-tooltip); position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
            background: var(--tooltip-bg); color: var(--text-main); padding: 6px 12px; border-radius: 4px; font-size: 0.75rem; width: max-content; max-width: 220px; 
            text-align: center; border: 1px solid var(--border); z-index: 100; white-space: normal; line-height: 1.4;
            font-family: 'Roboto', sans-serif; box-shadow: 0 4px 15px var(--shadow); pointer-events: none;
        }
        .top-header .tooltip-box:hover::after { bottom: auto; top: 125%; }
        .mastery-group.tooltip-box:hover::after { bottom: 100%; }
        .connection-tab.tooltip-box:hover::after { bottom: 130%; }

        /* --- SIDE PANEL & PROFILE --- */
        .history-panel { 
            box-sizing: border-box; position: fixed; 
            right: -520px; 
            top: 0; 
            width: 500px; 
            height: 100vh; background: var(--panel-bg); border-left: 2px solid var(--border); transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 200; overflow-y: auto; overflow-x: hidden; 
        }
        .history-panel.active { right: 0; border-left-color: var(--blue); box-shadow: -10px 0 30px var(--shadow); }
        
        .sidebar-content { position: relative; z-index: 10; padding: 30px; }
        .close-btn { cursor: pointer; color: var(--red); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; display: inline-block; font-weight: bold; }

        .sidebar-pro-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 480px;
            background-size: cover; background-position: center top;
            opacity: 0.6; pointer-events: none; z-index: 0;
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 100%);
        }

        .panel-bio { color: var(--gold); font-size: 1.05rem; margin-top: -10px; margin-bottom: 15px; font-weight: 800; text-shadow: var(--text-shadow); }

        .panel-socials { display: flex; gap: 8px; margin: 15px 0; }
        .panel-social-link { font-size: 0.75rem; padding: 4px 10px; background: var(--search-bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text-main); text-decoration: none; font-weight: bold; transition: 0.2s; box-shadow: var(--shadow-card); }
        .panel-social-link:hover { border-color: var(--blue); transform: translateY(-2px); }
        
        .panel-smurfs { margin-top: 15px; }
        .panel-smurfs-title { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; margin-bottom: 8px; letter-spacing: 1px; }
        .panel-smurfs-list { display: flex; flex-direction: column; gap: 4px; }
        .panel-smurfs-list span { font-size: 0.9rem; color: var(--text-main); font-family: monospace; background: var(--item-bg); padding: 5px 10px; border-radius: 4px; border: 1px solid var(--border); width: fit-content; }

        /* --- SIDEBAR MATCH CARDS --- */
        .match-card { background: var(--card); padding: 15px; margin-bottom: 12px; border-radius: 6px; box-shadow: var(--shadow-card); display: flex; gap: 15px; align-items: center; border: 1px solid var(--border); border-left-width: 4px; }
        .match-champs { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .match-champ-icon { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--border); }
        .opp-champ { opacity: 0.7; filter: grayscale(40%); width: 35px; height: 35px; }
        .match-details { flex: 1; }
        .item-row { display: flex; gap: 4px; margin-top: 6px; }
        .item-slot { width: 24px; height: 24px; background: var(--item-bg); border: 1px solid var(--border); border-radius: 3px; }
        .item-slot img { width: 100%; height: 100%; border-radius: 2px; object-fit: cover; }

    </style>
</head>
<body>

<header class="top-header">
    <div class="header-left">
        <div class="logo">PRO TRACKER</div>
        <div class="region-selector">
            <span class="active">EUW</span>
            <span class="disabled tooltip-box" data-tooltip="Not currently supported">NA</span>
            <span class="disabled tooltip-box" data-tooltip="Not currently supported">EUNE</span>
            <span class="disabled tooltip-box" data-tooltip="Not currently supported">KR</span>
            <span class="disabled tooltip-box" data-tooltip="Not currently supported">CN</span>
        </div>
    </div>
    
    <div class="header-right">
        <div class="search-area">
            <div class="search-container" id="search-container">
                <input type="text" id="target" placeholder="TARGET#TAG" autocomplete="off">
                <div id="search-icon" class="search-icon">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </div>
                <div id="scan-loader" class="scan-loader"></div>
            </div>
        </div>
        
        <button class="share-btn tooltip-box" data-tooltip="Copy unique link to share this lobby" onclick="copyLobbyLink(this)">
            SHARE
        </button>

        <a href="https://discord.gg/yourdiscordlink" target="_blank" class="discord-btn">
            Want your custom player card? Head to our discord!
        </a>
    </div>
</header>

<div class="top-zone">
    <div class="intel-banner-container">
        <div class="intel-banner" id="intel-banner">
            <span class="intel-text" id="intel-text"></span>
        </div>
    </div>
</div>

<div class="arena" id="arena">
    <div id="left-team" class="team-box"></div>
    <div id="right-team" class="team-box"></div>
</div>

<div class="bottom-zone"></div>

<div id="history-panel" class="history-panel">
    <div id="sidebar-bg-container"></div>
    <div class="sidebar-content">
        <span class="close-btn" id="close-panel-btn">✕ CLOSE</span>
        <h1 id="panel-player-name" style="font-size: 2.5rem; margin-top: 0; text-shadow: var(--text-shadow);">PLAYER</h1>
        <p id="panel-riot-id" style="color: var(--text-muted); margin-top: -15px; font-weight: bold;"></p>
        <div id="panel-bio" class="panel-bio"></div>
        
        <div id="panel-profile-section"></div>
        <div style="height: 1px; background: var(--border); margin: 25px 0;"></div>
        <div id="history-loading">Fetching match history...</div>
    </div>
</div>

<script>
    const lTeam = document.getElementById('left-team');
    const rTeam = document.getElementById('right-team');
    const hPanel = document.getElementById('history-panel');
    const scanLoader = document.getElementById('scan-loader');
    const searchIcon = document.getElementById('search-icon');
    let patch = "14.8.1"; 

    let isPanelOpen = false;

    // Simulate Copying Link
    function copyLobbyLink(btn) {
        const dummyLink = "protracker.gg/live/EUW/19238471";
        navigator.clipboard.writeText(dummyLink);
        
        btn.innerHTML = "COPIED!";
        btn.style.color = "var(--green)";
        btn.style.borderColor = "var(--green)";
        
        setTimeout(() => {
            btn.innerHTML = "SHARE";
            btn.style.color = "";
            btn.style.borderColor = "";
        }, 2000);
    }

    // Dynamic Mastery Formatter (Millions vs Thousands)
    function formatMastery(points) {
        if (!points) return "0k";
        if (points >= 1000000) {
            return (points / 1000000).toFixed(1) + "M";
        }
        return Math.floor(points / 1000) + "k";
    }

    // --- DYNAMIC TOOLTIP LOGIC ---
    function getTooltipText(tag, player) {
        switch(tag) {
            case "On Fire": return `Won 3 games in a row with ${player.champName}`;
            case "Winners Queue": return "Won 5 games in a row overall";
            case "Unlucky": return `Lost 3 games in a row with ${player.champName}`;
            case "Losers Queue": return "Lost 5 games in a row overall";
            case "TILT SWAPPED": return "Playing on an alt account after a heavy loss streak on their main.";
            case "SECRET WEAPON": return `Low account mastery, but elite proficiency with ${player.champName} across combined database.`;
            case "OFF-ROLE PRACTICE": return "High-elo player currently practicing an off-role.";
            case "PRO": return `Verified Professional Player: ${player.pro_name}`;
            case "OTP": return `Played 90%+ of their recent matches with ${player.champName}`;
            case "INSECURE": return "Hiding identity (Streamer Mode)";
            default: return tag; 
        }
    }

    // --- UNIFIED BADGE COLOR LOGIC ---
    function getBadgeClass(tag) {
        const positives = ["Winners Queue", "On Fire", "STOMP ANGLE?"];
        const negatives = ["Unlucky", "Losers Queue", "TILT SWAPPED", "YOU'RE COOKED", "FF ANGLE?", "INSECURE"];
        
        if (positives.includes(tag)) return "badge-positive";
        if (negatives.includes(tag)) return "badge-negative";
        if (tag === "SECRET WEAPON") return "badge-special";
        if (tag === "PRO") return "badge-pro";
        if (tag === "OTP") return "badge-otp";
        
        return "badge-neutral"; 
    }

    // --- MOCK DATA ---
    const mockLobbyData = {
        allies: [
            { puuid: "a4", riotId: "SloppyWalrus#NA", is_streamer: false, champName: "Gragas", is_pro: true, pro_name: "Sloppy Walrus", rank: "Master", lp: 310, total_mastery: 2500000, tag: null, side: "ally", mantra: "BOMBA", winrate: "58%", kda: "3.2 / 4.1 / 8.5", socials: { Twitter: "@SloppyWalrusX", Twitch: "SloppyWalrus" }, smurfs: ["SloppyWalrus", "Bomba King"], effect: "mythic" },
            { puuid: "a2", riotId: "Oner#T1", is_streamer: false, champName: "LeeSin", is_pro: true, pro_name: "Oner", rank: "Challenger", lp: 850, total_mastery: 2100000, tag: "TILT SWAPPED", side: "ally", winrate: "54%", kda: "4.1 / 2.8 / 7.2", socials: { Instagram: "t1_oner" }, smurfs: ["T1 Oner", "Jg Diff"] },
            { puuid: "a5", riotId: "Autofilled#SUPP", is_streamer: true, champName: "Yuumi", is_pro: false, pro_name: null, rank: "Unranked", total_mastery: 0, tag: null, side: "ally", winrate: "0%", kda: "0 / 0 / 0" },
            { puuid: "a1", riotId: "Thebausffs#EUW", is_streamer: false, champName: "Sion", is_pro: true, pro_name: "Thebausffs", rank: "Challenger", lp: 1120, ladder_rank: 112, total_mastery: 4500000, tag: null, side: "ally", mantra: "Solo Bolo", winrate: "49%", kda: "2.1 / 9.5 / 4.2", is_otp: true, socials: { Twitter: "@thebausffs", YouTube: "Thebausffs" }, smurfs: ["Thebausffs", "Babuss", "Jens"] },
            { puuid: "a3", riotId: "Faker#T1", is_streamer: false, champName: "Akali", is_pro: true, pro_name: "Faker", real_name: "Lee Sang-hyeok", role: "Mid Laner", rank: "Challenger", lp: 1420, ladder_rank: 25, total_mastery: 2500000, tag: "On Fire", side: "ally", mantra: "All roads lead to me.", winrate: "56%", kda: "6.5 / 2.1 / 5.5", socials: { Twitter: "@faker", Twitch: "faker" }, smurfs: ["Hide on bush", "T1 Faker"], real_img: "https://upload.wikimedia.org/wikipedia/commons/1/1a/Faker_2020_interview.jpg", history: { type: 'familiar', text: "Played together on an alt account.", asTeammate: { wins: 5, losses: 1 }, asEnemy: { wins: 2, losses: 1 } } }
        ],
        enemies: [
            { puuid: "e5", riotId: "NoVision#GG", is_streamer: false, champName: "Nautilus", is_pro: false, pro_name: null, rank: "Emerald", lp: 12, total_mastery: 50000, tag: "Unlucky", side: "enemy", winrate: "48%", kda: "1.2 / 6.5 / 12.1" },
            { puuid: "e1", riotId: "TopDiff#NA", is_streamer: true, champName: "Darius", is_pro: false, pro_name: null, rank: "Diamond", lp: 10, total_mastery: 45000, tag: "OFF-ROLE PRACTICE", side: "enemy", winrate: "41%", kda: "1 / 4 / 2" },
            { puuid: "e3", riotId: "Chovy#GENG", is_streamer: false, champName: "Azir", is_pro: true, pro_name: "Chovy", real_name: "Jeong Ji-hoon", role: "Mid Laner", rank: "Challenger", lp: 1600, ladder_rank: 3, total_mastery: 1900000, tag: "SECRET WEAPON", side: "enemy", winrate: "61%", kda: "5.5 / 1.2 / 6.8", socials: { Instagram: "chovy_le" }, smurfs: ["Gen G Chovy"], history: { type: 'nemesis', text: "Lost to their Azir on an alt account last week.", asTeammate: { wins: 0, losses: 0 }, asEnemy: { wins: 1, losses: 4 } } },
            { puuid: "e2", riotId: "Jgl Diff#NA", is_streamer: false, champName: "Nidalee", is_pro: false, pro_name: null, rank: "Master", lp: 250, total_mastery: 800000, tag: "Losers Queue", side: "enemy", winrate: "52%", kda: "4.8 / 3.5 / 6.1" },
            { puuid: "e4", riotId: "ToxicGuy#123", is_streamer: false, champName: "Draven", is_pro: false, pro_name: null, rank: "Platinum", lp: 99, total_mastery: 1200000, tag: "Losers Queue", side: "enemy", winrate: "49%", kda: "7.1 / 6.2 / 3.5" }
        ]
    };

    const mockMatchHistory = [
        { result: "VICTORY", isWin: true, myChamp: "Sion", oppChamp: "Darius", kda: "4 / 2 / 8", time: "2 hours ago", items: [3152, 3047, 3089, 3110] },
        { result: "DEFEAT", isWin: false, myChamp: "Sion", oppChamp: "Aatrox", kda: "1 / 9 / 2", time: "5 hours ago", items: [3152, 3047, 1001] },
        { result: "VICTORY", isWin: true, myChamp: "Gragas", oppChamp: "Malphite", kda: "12 / 2 / 8", time: "1 day ago", items: [3152, 3020, 3089, 3157, 3135] }
    ];

    function renderTeamSummary(teamArray, side, teamTags) {
        let totalMastery = 0;
        let wrSum = 0;
        let validWrCount = 0;
        
        teamArray.forEach(p => {
            totalMastery += p.total_mastery || 0;
            if (p.winrate && p.winrate !== "0%") {
                wrSum += parseInt(p.winrate);
                validWrCount++;
            }
        });
        
        const avgWrInt = validWrCount ? Math.round(wrSum / validWrCount) : 0;
        const avgWr = validWrCount ? avgWrInt + "%" : "N/A";
        const wrClass = avgWrInt >= 50 ? 'stat-winrate' : 'stat-winrate-negative';

        const sideClass = side === 'ally' ? 'ally-card' : 'enemy-card';
        
        let tagHtml = teamTags.map(tag => {
            return `<div class="badge ${getBadgeClass(tag)}">${tag}</div>`;
        }).join('');

        return `
        <div class="card summary-card ${sideClass}">
            <div class="row-content">
                <div class="identity-group"></div> 
                
                <div class="mastery-group tooltip-box" data-tooltip="Combined True Mastery of the entire team">
                    <div class="mastery-label" style="color: var(--gold);">TEAM MASTERY</div>
                    <div class="mastery-score">${formatMastery(totalMastery)}</div>
                </div>
                
                <div class="stats-group">
                    <div class="stat-line" style="margin:0;">Avg WR: <span class="${wrClass}">${avgWr}</span></div>
                </div>
                
                <div class="tags-group">
                    ${tagHtml}
                </div>
            </div>
        </div>`;
    }

    function render(p, index) {
        const splashImg = `https://ddragon.leagueoflegends.com/cdn/img/champion/centered/${p.champName}_0.jpg`;
        const clickAction = p.is_streamer ? "" : `onclick='openHistory(${JSON.stringify(p).replace(/'/g, "&#39;")})'`;
        const unclickableClass = p.is_streamer ? 'unclickable' : '';
        const searcherClass = p.is_searcher ? 'searcher-card' : '';
        
        const effectClass = p.effect ? `effect-${p.effect}` : '';

        // --- ENCOUNTER COUNTER TAB LOGIC ---
        let connectionHtml = "";
        if (p.history && (p.history.asTeammate || p.history.asEnemy)) {
            const tabLabel = p.history.type === 'nemesis' ? 'NEMESIS' : 'FAMILIAR';
            
            const tW = p.history.asTeammate ? p.history.asTeammate.wins : 0;
            const tL = p.history.asTeammate ? p.history.asTeammate.losses : 0;
            const eW = p.history.asEnemy ? p.history.asEnemy.wins : 0;
            const eL = p.history.asEnemy ? p.history.asEnemy.losses : 0;
            
            const totalW = tW + eW;
            const totalL = tL + eL;
            
            const recordStr = `<span class="tab-highlight">[${totalW}W - ${totalL}L]</span>`;
            
            connectionHtml = `
                <div class="connection-tab tab-${p.history.type} tooltip-box" data-tooltip="${p.history.text}">
                    ${tabLabel}${recordStr}
                </div>
            `;
        }

        const ladderRankDisplay = p.ladder_rank ? `<span class="ladder-rank">#${p.ladder_rank}</span>` : '';
        
        let identityHtml = "";
        if (p.is_streamer) {
            identityHtml = `
                <div class="riot-id-wrapper">
                    <span class="main-name">HIDDEN</span>
                </div>
                <div class="smurf-tag">Streamer Mode</div>`;
        } else if (p.is_pro) {
            const mantraHtml = p.mantra ? `<div class="mantra-text">— <i>"${p.mantra}"</i></div>` : '';
            identityHtml = `
                <div class="pro-label">${p.pro_name}</div>
                <div class="riot-id-wrapper">
                    <span class="smurf-tag truncate-text">${p.riotId}</span>
                    ${ladderRankDisplay}
                </div>
                ${mantraHtml}
            `;
        } else {
            identityHtml = `
                <div class="riot-id-wrapper">
                    <span class="main-name truncate-text">${p.riotId}</span>
                    ${ladderRankDisplay}
                </div>`;
        }

        let masteryHtml = `<div class="mastery-group"></div>`;
        if (!p.is_streamer) {
            masteryHtml = `
                <div class="mastery-group tooltip-box" data-tooltip="Combined True Mastery tracked across all known smurf accounts.">
                    <div class="mastery-label">True Mastery</div>
                    <div class="mastery-score">${formatMastery(p.total_mastery)}</div>
                </div>
            `;
        }

        let statsHtml = `<div class="stats-group"></div>`;
        if (!p.is_streamer) {
            const rankDisplay = p.rank !== 'Unranked' ? `${p.rank} <span class="stat-highlight">${p.lp || 0} LP</span>` : 'Unranked';
            
            const wrInt = parseInt(p.winrate);
            const wrClass = wrInt >= 50 ? 'stat-winrate' : 'stat-winrate-negative';

            statsHtml = `
                <div class="stats-group">
                    <div class="stat-line">${rankDisplay}</div>
                    <div class="stat-line">WR: <span class="${wrClass}">${p.winrate}</span></div>
                    <div class="stat-line">KDA: <span class="stat-highlight">${p.kda}</span></div>
                </div>
            `;
        }

        let tagsHtml = '';
        if (p.is_pro) tagsHtml += `<div class="badge ${getBadgeClass('PRO')} tooltip-box" data-tooltip="${getTooltipText('PRO', p)}">PRO</div>`;
        
        if (!p.is_streamer) {
            if (p.is_otp) {
                tagsHtml += `<div class="badge ${getBadgeClass('OTP')} tooltip-box" data-tooltip="${getTooltipText('OTP', p)}">OTP</div>`;
            }
            if (p.tag) {
                tagsHtml += `<div class="badge ${getBadgeClass(p.tag)} tooltip-box" data-tooltip="${getTooltipText(p.tag, p)}">${p.tag}</div>`;
            }
        } else {
            tagsHtml += `<div class="badge ${getBadgeClass('INSECURE')} tooltip-box" data-tooltip="${getTooltipText('INSECURE', p)}">INSECURE</div>`;
        }

        return `
            <div class="card ${p.side === 'ally' ? 'ally-card' : 'enemy-card'} ${unclickableClass} ${searcherClass} ${effectClass}" 
                 style="animation-delay: ${index * 0.15}s;" 
                 ${clickAction}>
                
                ${connectionHtml}
                
                <div class="card-bg-wrapper">
                    <div class="champ-splash" style="background-image: url('${splashImg}')"></div>
                </div>

                <div class="row-content">
                    <div class="identity-group">
                        ${identityHtml}
                    </div>
                    ${masteryHtml}
                    ${statsHtml}
                    <div class="tags-group">
                        ${tagsHtml}
                    </div>
                </div>
            </div>`;
    }

    async function executeScan() {
        const rawQuery = document.getElementById('target').value.trim();
        if(!rawQuery.includes('#')) return;
        const query = rawQuery.toLowerCase();

        searchIcon.style.display = 'none';
        scanLoader.style.display = 'block';
        
        lTeam.innerHTML = '';
        rTeam.innerHTML = '';
        
        const intelBanner = document.getElementById('intel-banner');
        intelBanner.style.display = 'none';

        await new Promise(r => setTimeout(r, 800)); 

        [...mockLobbyData.allies, ...mockLobbyData.enemies].forEach(p => {
            p.is_searcher = (p.riotId && p.riotId.toLowerCase() === query);
        });

        const intelText = document.getElementById('intel-text');
        const msg = `<span class='intel-accent'>GAME INFO:</span> Enemy Mid is holding a <div class="badge badge-special" style="display:inline-block; vertical-align:middle; margin:0 4px; box-shadow:none;">SECRET WEAPON</div>. Enemy Top is on <div class="badge badge-neutral" style="display:inline-block; vertical-align:middle; margin:0 4px; box-shadow:none;">OFF-ROLE PRACTICE</div>. The enemy jungle clears significantly faster than your team's.`;
        intelText.innerHTML = msg;
        intelBanner.style.display = 'flex';

        let allyScore = 0, enemyScore = 0;
        
        mockLobbyData.allies.forEach(p => {
            if(p.tag === "Winners Queue") allyScore += 2;
            if(p.tag === "On Fire") allyScore += 1;
            if(p.tag === "Losers Queue" || p.tag === "TILT SWAPPED") allyScore -= 2;
            if(p.tag === "Unlucky") allyScore -= 1;
        });
        mockLobbyData.enemies.forEach(e => {
            if(e.tag === "Winners Queue" || e.tag === "SECRET WEAPON") enemyScore += 2;
            if(e.tag === "On Fire") enemyScore += 1;
            if(e.tag === "Losers Queue" || e.tag === "TILT SWAPPED") enemyScore -= 2;
            if(e.tag === "Unlucky" || e.tag === "OFF-ROLE PRACTICE") enemyScore -= 1;
        });

        let diff = allyScore - enemyScore;
        let allyTeamTags = [];
        let enemyTeamTags = [];
        
        if (diff <= -4) {
            allyTeamTags.push("YOU'RE COOKED");
            enemyTeamTags.push("STOMP ANGLE?");
        } else if (diff <= -2) {
            allyTeamTags.push("FF ANGLE?");
            enemyTeamTags.push("STOMP ANGLE?");
        } else if (diff >= 4) {
            allyTeamTags.push("STOMP ANGLE?");
            enemyTeamTags.push("YOU'RE COOKED");
        } else if (diff >= 2) {
            allyTeamTags.push("STOMP ANGLE?");
            enemyTeamTags.push("FF ANGLE?");
        }

        lTeam.innerHTML = renderTeamSummary(mockLobbyData.allies, 'ally', allyTeamTags) + mockLobbyData.allies.map((p, index) => render(p, index)).join('');
        rTeam.innerHTML = renderTeamSummary(mockLobbyData.enemies, 'enemy', enemyTeamTags) + mockLobbyData.enemies.map((p, index) => render(p, index)).join('');

        scanLoader.style.display = 'none';
        searchIcon.style.display = 'block';
    }

    // Side Panel Logic
    async function openHistory(p) {
        if (!p.puuid || p.is_streamer) return; 
        isPanelOpen = true;
        hPanel.classList.add('active');
        
        document.getElementById('panel-player-name').innerText = p.pro_name || p.riotId.split('#')[0];
        document.getElementById('panel-riot-id').innerText = p.riotId;
        
        const bioDiv = document.getElementById('panel-bio');
        if (p.is_pro && (p.real_name || p.role)) {
            const rName = p.real_name || "Identity Unknown";
            const rRole = p.role || "Unknown Role";
            bioDiv.innerHTML = `${rName} &nbsp;•&nbsp; ${rRole}`;
        } else {
            bioDiv.innerHTML = "";
        }
        
        let profileHtml = "";
        let bgHtml = "";

        if (p.is_pro) {
            if (p.real_img) {
                bgHtml = `<div class="sidebar-pro-bg" style="background-image: url('${p.real_img}')"></div>`;
            }
            
            let socialsHtml = "";
            if (p.socials) {
                for (const [platform, handle] of Object.entries(p.socials)) {
                    socialsHtml += `<a href="#" class="panel-social-link">${platform}: ${handle}</a>`;
                }
            }
            
            let smurfsHtml = "";
            if (p.smurfs && p.smurfs.length > 0) {
                smurfsHtml = `
                    <div class="panel-smurfs">
                        <div class="panel-smurfs-title">Connected Database Accounts</div>
                        <div class="panel-smurfs-list">
                            ${p.smurfs.map(s => `<span>${s}</span>`).join('')}
                        </div>
                    </div>`;
            }
            
            let encounterHtml = "";
            if (p.history && (p.history.asTeammate || p.history.asEnemy)) {
                const tW = p.history.asTeammate ? p.history.asTeammate.wins : 0;
                const tL = p.history.asTeammate ? p.history.asTeammate.losses : 0;
                const eW = p.history.asEnemy ? p.history.asEnemy.wins : 0;
                const eL = p.history.asEnemy ? p.history.asEnemy.losses : 0;
                
                const total = tW + tL + eW + eL;
                const totalW = tW + eW;
                const overallWr = total > 0 ? Math.round((totalW / total) * 100) : 0;
                const histColor = overallWr >= 50 ? 'var(--green)' : 'var(--red)';
                
                encounterHtml = `
                    <div style="margin-top: 15px; padding: 12px; background: var(--item-bg); border-radius: 6px; border: 1px solid var(--border);">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <span style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; letter-spacing: 1px;">Encounter History</span>
                            <span style="font-size: 0.85rem; font-weight: 900; color: ${histColor};">${overallWr}% WR</span>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <div style="background: var(--card); padding: 8px; border-radius: 4px; border: 1px solid var(--border);">
                                <div style="font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px;">As Teammate</div>
                                <div style="font-size: 0.9rem; font-weight: 800; color: var(--text-main);"><span style="color:var(--green);">${tW}W</span> - <span style="color:var(--red);">${tL}L</span></div>
                            </div>
                            <div style="background: var(--card); padding: 8px; border-radius: 4px; border: 1px solid var(--border);">
                                <div style="font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px;">As Enemy</div>
                                <div style="font-size: 0.9rem; font-weight: 800; color: var(--text-main);"><span style="color:var(--green);">${eW}W</span> - <span style="color:var(--red);">${eL}L</span></div>
                            </div>
                        </div>
                    </div>
                `;
            }

            profileHtml = `
                <div class="panel-socials">${socialsHtml}</div>
                ${smurfsHtml}
                ${encounterHtml}
            `;
        }
        
        document.getElementById('sidebar-bg-container').innerHTML = bgHtml;
        document.getElementById('panel-profile-section').innerHTML = profileHtml;

        const loadingDiv = document.getElementById('history-loading');
        loadingDiv.innerHTML = `<div style="color: var(--text-muted); font-style: italic; text-align: center; margin-top: 50px;">Fetching Riot Match Database...</div>`;
        
        await new Promise(r => setTimeout(r, 600));

        const historyHtml = mockMatchHistory.map(match => {
            const color = match.isWin ? 'var(--blue)' : 'var(--red)';
            const itemsHtml = match.items.map(id => `<div class="item-slot"><img src="https://ddragon.leagueoflegends.com/cdn/${patch}/img/item/${id}.png" alt="item"></div>`).join('');
            const myImg = `https://ddragon.leagueoflegends.com/cdn/${patch}/img/champion/${match.myChamp}.png`;
            const oppImg = `https://ddragon.leagueoflegends.com/cdn/${patch}/img/champion/${match.oppChamp}.png`;

            return `
            <div class="match-card" style="border-left-color: ${color}">
                <div class="match-champs tooltip-box" data-tooltip="Laned against ${match.oppChamp}">
                    <img src="${myImg}" class="match-champ-icon" alt="${match.myChamp}">
                    <span style="font-size:0.7rem; color:var(--text-muted); font-weight:bold; margin: 0 2px;">VS</span>
                    <img src="${oppImg}" class="match-champ-icon opp-champ" alt="${match.oppChamp}">
                </div>
                <div class="match-details">
                    <div style="color: ${color}; font-weight: 900; font-size: 0.9rem;">${match.result} <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: normal; margin-left: 5px;">${match.time}</span></div>
                    <div style="font-family: monospace; color: var(--text-main); font-size: 1rem; font-weight:bold; margin: 3px 0;">${match.kda}</div>
                    <div class="item-row">${itemsHtml}</div>
                </div>
            </div>`;
        }).join('');

        loadingDiv.innerHTML = historyHtml;
    }

    document.getElementById('target').addEventListener('keypress', e => { 
        if (e.key === 'Enter') executeScan(); 
    });

    document.getElementById('close-panel-btn').addEventListener('click', () => { 
        isPanelOpen = false; hPanel.classList.remove('active'); 
    });

    document.addEventListener('click', (event) => {
        if (isPanelOpen && !hPanel.contains(event.target) && !event.target.closest('.card')) { 
            isPanelOpen = false; hPanel.classList.remove('active'); 
        }
    });
</script>
</body>
</html>
